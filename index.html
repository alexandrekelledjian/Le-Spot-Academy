rse logistics / returns management** :\\n   - Track damaged items return rate par salon. Si salon A = 20% damage rate vs avg 5% = issue.\\n   - Intervention : retrain salon staff, improve packaging, or change SKU (less fragile products)\\n   - Circular economy angle : don't throw casse, repair & resell as \\\"outlet\\\" products at -30%, or donate to charity. Brand optics positive.\\", "keyTerms": ["Last mile", "Click & Collect", "Ship-from-store", "Dark store", "Logistique verte", "Économie circulaire"], "quiz": [{"q": "Le last mile représente quel % du coût logistique total ?", "options": ["15%", "30%", "53%", "75%"], "correct": 2}, {"q": "Le Click & Collect représente quel % des commandes e-com FR ?", "options": ["10%", "25%", "40%", "60%"], "correct": 2}, {"q": "Ship-from-store signifie :", "options": ["Expédier vers le magasin", "Le magasin expédie directement au client", "Stocker en magasin uniquement", "Livraison gratuite en magasin"], "correct": 1}]}]}, {"id": "business-models", "icon": "💡", "title": "Nouveaux Business Models", "color": "from-violet-600 to-purple-700", "tagline": "Business Talk : 'Du retail au service as a product'", "days": [{"day": 1, "title": "Service as a Product & nouveaux modèles", "content": "Le 3e Business Talk du Spot pose LA question pivot : comment monétiser au-delà du produit ?\\n\\n**Le \\\"Product-as-a-Service\\\" (PaaS) - révolution business model :**\\n\\nPlutôt que vendre un produit (ownership transfer), on vend l'usage/l'accès à durée limitée. \\n\\nExemples:\\n- **Decathlon circular** : loue un vélo pour l'été au lieu de l'acheter. Decathlon garde ownership, responsabilité maintenance. Client paye 30€/mois. Lifetime value = 180€ vs 800€ one-time sale. Recurring revenue + sustainability halo.\\n- **Ikea rental** : test en EU. Loue des meubles pour appartements temporaires. Client ne veut pas acheter, Ikea remarket meubles après.\\n- **Mud Jeans** : loue des jeans. Trade-in program : jeans usé => retour => Mud reconditionne => repeat. Avoid fast fashion waste.\\n\\nAvantage business : recurring revenue > one-time sale. Récurrence valuation = 3-5x vs one-time (SaaS multiples s'appliquent).\\n\\n**La marketplace (open platform) :**\\nUne enseigne ouvre sa plateforme digitale (+ physique) à des vendeurs tiers.\\n\\n**Cas Castorama Marketplace (3 personnes au Spot)** :\\nCastorama a 80+ magasins + plateforme marketplace. Stratégie :\\n- Castorama appro ses produits own-brand\\n- Marketplace permet vendeurs tiers (petit électroportatif maker, designer custom fixtures) à vendre alongside\\n- Castorama takes 15-25% commission\\n- Magasins deviennent \\\"hubs\\\" : clients achètent own-brand + marketplace en même temps\\n- Benefit : expanded catalog without inventory, commission revenue stream\\n\\n**Cas Leroy Merlin / Kingfisher marketplaces** : similaire stratégie, expand catalog, take commission.\\n\\nAvantage : élargir catalog 10x sans stock proportionnel. Marketplace sellers assume inventory risk.\\n\\n**Le modèle d'abonnement / subscription :**\\nClient paie mensuel/annuel pour accès ou produits réguliers.\\n\\n**Exemples réussis :**\\n- **Dollar Shave Club** : révolutionne le rasoir. Abonnement = lame/mois. Disrupted Gillette.\\n- **Birchbox** : box beauté curatée/mois. Subscription model allowed them to raise $ despite tough cosmetics market.\\n- **Sephora+ / Ulta Beauty abonnement** : access exclusif + points bonus. Drive recurring engagement.\\n- **Netflix/Spotify disrupted retail** : replaced buy-per-item with subscription.\\n\\nAdolescents + young adults LOVE subscription (perceived value, convenience, discover). Older segments less so.\\n\\n**La seconde main / circular economy :**\\nVinted disrupted fashion (peer-to-peer). Now established retailers integrate:\\n- **Decathlon occasion** : trade-in program, resell marketplace\\n- **Kiabi seconde main** : in-store secondhand corner\\n- **Patagonia Worn Wear** : brand's own secondhand + repair service\\n- **Vestiaire Collective partnerships** : luxury brands allow authenticated resale\\n\\n**Cas Cash Converters + Easy Cash (6 personnes au Spot, spécialistes \\\"reprise\\\")** :\\nSecondhand/buyback models. Cash Converters = buy used electronics/products, resell. Easy Cash = special focus on electronics + jewelry buyback. Business model = margin sur reprise (buy 100€ used phone, resell 150€). Capital-light si done right (no inventory investment, just quick churn).\\n\\n**Franchise & réseau (Provalliance, Burger King, Dessange au Spot)** :\\nMODÈLE LE PLUS CAPITAL EFFICIENT : franchisé finance l'expansion. Franchiseur takes royalties.\\n- Franchise représente **170 milliards €** CA en France\\n- Rousselot du concept avec partenaires multiples vs 1 owner = faster geographic coverage\\n\\n**Ton modèle : Consignment Retail (Dépôts Gemmes) :**\\n\\nC'est un HYBRID business model ultra-clever à pitcher :\\n- **PaaS angle** : Tu fournis \\\"retail shelf space\\\" as a service. Salon ne paie pas pour l'espace, paie commission sur vente.\\n- **Marketplace angle** : 450 salons = tu es \\\"marketplace aggregator\\\" offrant jewelry aux 450 audiences.\\n- **Abonnement angle** : salon paie pickup logistics cycliquement (45j), c'est semi-recurring.\\n- **Zero-risk pour salon** : salon prend commission, 0 investment in inventory. Risk-averse salons LOVE c'est model.\\n\\n**APPROPRIATION DÉPÔTS GEMMES :**\\n\\n1. **Pitch consignment as franchise-lite** :\\n   - Traditional franchise = salon doit acheter 50K€ stock, paye royalties. High risk.\\n   - Dépôts Gemmes model = salon donne retail shelf, reçoit 30% commission. Zero risk. Win-win.\\n   - Pitch = \\\"No risk jewelry franchise. We take the inventory risk, you take the revenue upside.\\\"\\n\\n2. **Expand to tiered commission model** :\\n   - Basic tier : 30% commission, standard restock 45j\\n   - Gold tier : 35% commission, restock 30j (faster rotation), get exclusive colors/designs first\\n   - Premium tier : 40% commission, custom assortment (we let them pick best sellers tailored to their salon clientele)\\n   - Upside : tiering increases motivation for salons to grow sales\\n\\n3. **Test marketplace extension** :\\n   - If Dépôts Gemmes becomes recognized brand, create actual online marketplace\\n   - Salon-direct sales : customer buys at salon, pays Dépôts Gemmes online (salon gets commission even on online sales)\\n   - Or : launch DTC e-commerce (direct-to-consumer) on the side, salon partners get featured\\n\\n4. **Subscription element** :\\n   - \\\"Jewelry Subscription\\\" : customer subscribes 19€/month, receives 1 new Dépôts Gemmes jewelry piece/month in their salon\\n   - Salon gets commission. Dépôts Gemmes gets recurring revenue. Customer feels special.\\n   - Recurring revenue stream > one-time sales. Business valuation would increase.\\n\\n5. **Second-hand angle** :\\n   - Partner with a platform (Vestiaire, Vinted, Rebag) to allow customers to resell old Dépôts Gemmes\\n   - You offer 10€ buyback per used piece (cost you 2-3€ to recondition, resell for 15€)\\n   - Margin on secondary market + brand loyalty (customer knows they can resell if unworn)\\n", "keyTerms": ["PaaS (Product-as-a-Service)", "Marketplace", "Subscription model", "Seconde main", "Franchise", "Consignment retail"], "quiz": [{"q": "Le PaaS dans le retail c'est :", "options": ["Platform as a Service (cloud)", "Vendre l'usage plutôt que le produit", "Payer Après la Satisfaction", "Production Automatisée et Systématique"], "correct": 1}, {"q": "La franchise représente combien de CA en France ?", "options": ["50 Mds €", "100 Mds €", "170 Mds €", "250 Mds €"], "correct": 2}, {"q": "Avantage principal d'une marketplace pour l'enseigne :", "options": ["Plus de stock à gérer", "Élargir le catalogue sans stock", "Réduire le nombre d'employés", "Fermer les magasins"], "correct": 1}]}, {"day": 2, "title": "Franchise, réseau et développement", "content": "Avec autant de directeurs franchise et réseau au Spot (Provalliance 9 personnes, Burger King, Dessange International), ce sujet réseau est INCONTOURNABLE.\\n\\n**Les modèles de réseau retail (du moins au plus risqué pour partenaire) :**\\n\\n- **Succursale** : siège possède et gère points directement. Zero partenaire risk, mais siège finance tout. Exemple : Sephora, Zara (majority own-stores).\\n\\n- **Franchise** : franchisé investit capital (30K-500K€ típique), exploite sous la marque, paie royalties (5-10% CA typically). Franchisé prend risque financial et opérationnel, but growth rapide pour franchiseur (capital-light). Dominant model en EU. Exemple : McDonald's 70% franchisé.\\n\\n- **Coopérative** : adhérents sont copropriétaires du réseau. Democratic mais slow-moving. Exemple : Biocoop (coopérative), Système U (semi), Intersport (cooperative structure but more franchise-like operations).\\n\\n- **Affiliation / Concession** : modèle intermédiaire. Partenaire vend sous enseigne avec engagements allégés vs franchise. Moins de royalties, moins de control. Exemple : stations essence (partenaires vendent carburant + produits, marque mère fournit pricing).\\n\\n- **Dépôt-vente (consignment)** : C'EST TON MODÈLE ! Partenaire expose produits SANS acheter, reçoit commission sur ventes seulement. Zéro investissement, zéro risque partenaire. Exemple : Les Georgettes bijoux en magasins indépendants, wine distributors en petits restaurants.\\n\\n**Cas Provalliance (9 personnes au Spot, master franchiseur) :**\\nProvalliance gère salons franchisés + propres salons. Structure :\\n- Core : 1000+ salons coiffure/beauté en network\\n- Mix : 60% franchisés, 40% own-stores\\n- Stratégie : franchisé apporte local expertise + capital, Provalliance apporte brand, training, supply chain\\n- KPI crucial : retention rate coiffuses (employees) = 65%. Burnout élevé in salon business, formation academy help\\n- Moteur croissance = franchisé recruitment + opening velocity\\n\\n**Cas Burger King Franchise (Master franchiseur au Spot) :**\\nBurger King France gère 400+ restaurants mostly franchised. Model :\\n- Franchisé = entrepreneur local. Investit 500K-1.5M€ en restaurant setup.\\n- Franchise fee + royalties 6% + marketing fund 2% = Burger King recurring revenue\\n- Burger King's role = supply chain, marketing, innovation (menu), training\\n- Challenge = maintaining quality in 400 different locations. Mystery shopper audits + tech monitoring.\\n\\n**Cas Dessange International (coiffure, au Spot) :**\\nDessange = franchise model pure. 300+ salons. Franchisé apporte salon physical + customer base, Dessange apporte brand + training + product supply. Retention crucial car hair business = relationship-heavy (customer loyal to coiffeuse, not necessarily brand).\\n\\n**KPIs réseau critiques :**\\n\\n- **Nombre de points** : growth metric. X nouveaux points/mois = brand expansion velocity\\n\\n- **CA moyen par point** : health check. Si CA moyen baisse = network aging ou market saturation\\n\\n- **Taux de renouvellement contrats** (renewal rate) : si 90% = healthy, 70% = problem\\n\\n- **Taux de résiliation** : inverse de renewal. <5%/year = good. >15% = network quality issue\\n\\n- **Vitesse de maillage** : combien de nouveaux points/mois. Ambitious = 10+/mois. Conservative = 2-3/mois\\n\\n- **Same-store sales growth** : CA growth in existing stores. Indicator if network learning/improving vs just growing unit count\\n\\n**Les enjeux communs (tes sujets clés en dépôts-vente) :**\\n\\n1. **Animation du réseau** : comment garder 450 partenaires MOTIVÉS et loyal ?\\n   - Monthly newsletter showcasing top performers\\n   - Quarterly incentives (best salon gets bonus)\\n   - Annual summit/meeting to renew relationships\\n   - Quick response to partner issues (casse damage, late delivery, quality problem)\\n\\n2. **Standardisation vs adaptation locale** : Paris salon ≠ Lyon salon. Assortment might be different. \\n   - Dépôts Gemmes angle = create 3-4 assortment \\\"flavors\\\" (VIP luxury, casual young, boho artisan)\\n   - Let salons choose which flavor, not force all salons into same assortment\\n\\n3. **Formation des partenaires** : training coiffeuses on how to sell jewelry\\n   - One-hour initial training = high impact\\n   - Quarterly tips sheet (\\\"These are the bestsellers this season\\\")\\n\\n4. **Contrôle qualité à distance** : audit présentoirs via photo, check compliance\\n   - Monthly \\\"health check\\\" photo : preshow looks clean, organized, no dust?\\n   - Rate : green (good), yellow (ok), red (issue). Yellow = nudge. Red = intervention.\\n\\n**Ton avantage compétitif à pitcher à Spot :**\\n\\nZéro investissement pour le salon = zero risk. Zéro création de dettes partenaire. Tu prends inventory risk, ils prennent revenue upside. C'est WINWIN et c'est moderne (look at Vinted, Vestiaire Collective disrupting fashion via marketplace model where seller risk = 0).\\n\\n**APPROPRIATION DÉPÔTS GEMMES :**\\n\\n1. **Create franchise documentation (even if called \\\"consignment\\\")** :\\n   - Franchise agreement : salon commits to space, frequency, display standards. Dépôts Gemmes commits to quality product, training, support.\\n   - SLA (Service Level Agreement) : Dépôts restock every 45 days on schedule, replace damaged within 3 days, provide training quarterly.\\n   - Termination clause : either party can exit with 30-day notice. Low-lock-in = low risk.\\n\\n2. **Design your \\\"franchise\\\" tiers as I outlined (Basic/Gold/Premium)** :\\n   - Incentivize upward mobility. Salon growing sales = move to Gold tier = better commission + exclusives.\\n   - Psychology = progression. Salon never wants to step backward.\\n\\n3. **Network animation playbook** :\\n   - Monthly : newsletter with bestsellers, styling tips, commission rankings\\n   - Quarterly : onsite training + photos + feedback\\n   - Annual : summit gathering all salon partners, celebrate top performers, roadmap for next year\\n   - Budget : 5-10% of revenue for animation. Worth it for retention.\\n\\n4. **Partnership agreement (one-page simple)** :\\n   - Salon name, address, contact\\n   - Commission rate (30% base, 35% gold, 40% premium)\\n   - Restock cycle (45 days standard)\\n   - Quality standards (display looks good, no damage acceptable)\\n   - Termination : 30 days notice from either side\\n   - This is franchise-lite. Simple. Not scary. Salon can read in 5 minutes.\\n", "keyTerms": ["Franchise", "Royalties", "Coopérative", "Maillage territorial", "Animation réseau", "Taux de renouvellement"], "quiz": [{"q": "Dans une franchise, le franchisé paie :", "options": ["Rien", "Des royalties (redevances)", "Le salaire du franchiseur", "Les impôts de la marque"], "correct": 1}, {"q": "Le dépôt-vente se distingue par :", "options": ["Le partenaire achète le stock", "Le partenaire expose sans acheter, paie sur les ventes", "Le partenaire est salarié", "Le partenaire est actionnaire"], "correct": 1}, {"q": "Le taux de renouvellement mesure :", "options": ["Le nombre de nouveaux produits", "La rétention des partenaires du réseau", "Le turnover des employés", "La fréquence de livraison"], "correct": 1}]}]}, {"id": "paiements", "icon": "💳", "title": "Paiements & Conversion", "color": "from-green-600 to-emerald-700", "tagline": "Masterclass dédiée : optimiser le tunnel de paiement.", "days": [{"day": 1, "title": "Paiements : la révolution silencieuse", "content": "Le paiement est le dernier maillon de la chaîne conversion. Mais un UX paiement pourri = vente perdue instantanément.\\n\\n**Les tendances paiement 2026 :**\\n\\n- **BNPL (Buy Now Pay Later)** : paiement en 3-4x sans intérêt. Alma, Klarna, Scalapay, Oney, Paypal Pay in 4. Impact : +20-30% average basket moyen car psychological price elasticity (19€ vs 4x 4.75€ feels different).\\n\\n  **Cas retail du Spot** : Le Creuset (cookware 150-300€) implemented Klarna. Result = ATV +18%, repeat rate +12% because customers who paid in 4x felt less payment pain and came back.\\n\\n- **Tap to Pay** : téléphone du vendeur devient terminal paiement. No need for TPE (traditional payment terminal). Vendeur has phone, customer taps card/wallet, done. Faster, cleaner.\\n\\n  **Adoption au Spot** : Decathlon equips field staff with phones for Tap to Pay in-store. Reduces checkout time, increases impulse buys.\\n\\n- **Paiement biométrique** : reconnaissance faciale (Amazon One) ou palmaire. Ultra-niche en France, mais Asia boom (especially China). EU regulatory hesitance (privacy).\\n\\n- **Unified Commerce payment** : un seul système de paiement pour online + offline + marketplace. Customer starts transaction on web, finishes in-store (or vice versa). One payment method, seamless. Hard to implement but strategic.\\n\\n  **Cas Sephora / Decathlon** : unified payment across web + app + in-store. Customer pays same way everywhere.\\n\\n- **Crypto / Stablecoins** : Still marginal in FR (0.1% transactions). But El Salvador + some Asian retailers accepting. Retail waits for regulatory clarity.\\n\\n**L'impact de l'UX paiement sur conversion :**\\n\\n- **70% paniers e-commerce abandonnés** : top reason = complicated checkout. If 100 people put items in cart, 70 abandon at payment gate.\\n- **One-click checkout** (Shop Pay, Apple Pay) : +35% conversion rate vs traditional 3-field form. Friction = enemy of conversion.\\n- **Proposer BNPL** : +20-30% panier moyen. Psychological trick : \\\"4x 25€\\\" easier to swallow than \\\"100€\\\".\\n- **Mobile payments** (Apple Pay, Google Pay) : 40-50% faster checkout than card-enter, +25% conversion.\\n\\n**Cas Transgourmet Head of Pricing (au Spot)** :\\nTransgourmet sells to 50K restaurants. Restaurateurs used to wire transfer (slow, heavy accounting). Shift to BNPL + digital wallets = immediate settlement. Restaurateur gets 2-day payment vs 5-day. Better cash flow = more orders. Transgourmet increased AOV +15%.\\n\\n**Scan & Go in physical retail :**\\nClient scans items as they shop (phone or handheld scanner), pays via phone at exit. No checkout line. Deployment : Carrefour (100+ stores), Decathlon (50+ stores). Impact : throughput +40%, customer satisfaction +20 NPS points, staff re-allocation from checkout to merchandising/service.\\n\\n**Ton business (Dépôts Gemmes) :**\\n\\nActuellement : coiffeuse encaisse cash de cliente, vous paie en espèces. Friction. Better : customer paiement direct (QR, card, BNPL), instant settlement to you, zero cash handling.\\n\\n**APPROPRIATION DÉPÔTS GEMMES :**\\n\\n1. **Implement QR code payment ON le présentoir** :\\n   - Customer spots bijou. Scans QR on display card.\\n   - Opens product page : photos, details, reviews, PAYMENT link\\n   - Can pay via Apple Pay / Google Pay / Stripe (any processor)\\n   - Payment goes to your account (or salon account, you settle later)\\n   - Real-time sales tracking + instant commission settlement\\n   - Cost : ~50€ setup per salon\\n   - ROI : conversion lift +10-15% (cause impulse reduced friction)\\n\\n2. **Offer BNPL for higher-end pieces** :\\n   - Standard pieces 18€ : normal payment only\\n   - Premium pieces 22€ : offer \\\"3x 7.50€ via Klarna\\\" or \\\"4x with Paypal Pay in 4\\\"\\n   - Cost to you : 4-5% fee. But conversion lift +20% = net positive\\n   - Example : 100 customers see 22€ bijou. Normally 15 buy. With BNPL, 18 buy. +3 sales x 22€ = 66€ incremental revenue. Cost = 66€ x 4% = 2.64€. Net gain = 63.36€. Worth it.\\n\\n3. **Tap to Pay for pickup agents** :\\n   - Pickup agent visits salon to collect commission. Instead of cash (awkward, security risk) :\\n   - Agent has iPhone/Android with payment app (Square, PayPal, Stripe reader)\\n   - Salon pays digitally to Dépôts Gemmes account\\n   - Settlement : next day to your bank\\n   - Benefit : auditable, zero theft risk, professional\\n\\n4. **Unified payment across channels** :\\n   - If you build DTC e-commerce (see module 7 day 1):\\n   - Customer can start buying online, finish in-salon\\n   - Or see in salon, buy online for pickup\\n   - Same payment method everywhere\\n   - Integration cost : ~1000€ setup but worth for seamlessness\\n\\n5. **Digital receipt + loyalty integration** :\\n   - Every payment generates digital receipt (email/SMS)\\n   - Receipt auto-enrolls in Dépôts Gemmes loyalty (if they consent)\\n   - Creates database of customers\\n   - Future : email them \\\"You bought bague in July, here are 3 matching colliers\\\" = repeat sell\\n\\n6. **Transparency on payment economics** :\\n   - If you implement BNPL or higher-cost payment, be transparent with salons\\n   - \\\"BNPL available, 4% fee. More conversions offset the cost.\\\"\\n   - Salon appreciates transparency, understands business model\\n", "keyTerms": ["BNPL", "Tap to Pay", "Unified Commerce", "Conversion rate", "One-click checkout", "Scan & Go"], "quiz": [{"q": "BNPL signifie :", "options": ["Best New Product Launch", "Buy Now Pay Later", "Brand New Payment Link", "Business Network Payment Layer"], "correct": 1}, {"q": "Quel % de paniers e-commerce sont abandonnés ?", "options": ["30%", "50%", "70%", "90%"], "correct": 2}, {"q": "Le BNPL augmente le panier moyen de :", "options": ["5-10%", "20-30%", "50-60%", "100%"], "correct": 1}]}]}], "GLOSSARY": [{"term": "B2B / B2C / B2B2C", "def": "Business to Business / Business to Consumer / Les deux (ton modèle : tu vends via des salons)"}, {"term": "CAC", "def": "Customer Acquisition Cost - coût pour acquérir un nouveau client"}, {"term": "Churn", "def": "Taux d'attrition - % de clients/partenaires qui partent sur une période"}, {"term": "CAGR", "def": "Compound Annual Growth Rate - taux de croissance annuel composé"}, {"term": "D2C (DTC)", "def": "Direct to Consumer - vente directe sans intermédiaire"}, {"term": "EBITDA", "def": "Earnings Before Interest, Taxes, Depreciation & Amortization - mesure de rentabilité opérationnelle"}, {"term": "GMV", "def": "Gross Merchandise Value - valeur brute des marchandises vendues (utilisé pour les marketplaces)"}, {"term": "KPI", "def": "Key Performance Indicator - indicateur clé de performance"}, {"term": "LTV / CLV", "def": "Lifetime Value / Customer Lifetime Value - valeur totale d'un client sur sa durée de vie"}, {"term": "MRR / ARR", "def": "Monthly/Annual Recurring Revenue - revenus récurrents (modèles abonnement)"}, {"term": "NPS", "def": "Net Promoter Score - mesure de la recommandation client (-100 à +100)"}, {"term": "OKR", "def": "Objectives & Key Results - méthode de fixation d'objectifs (Google, etc.)"}, {"term": "PoC", "def": "Proof of Concept - preuve de concept, test avant déploiement"}, {"term": "ROI / ROAS", "def": "Return on Investment / Return on Ad Spend"}, {"term": "SaaS", "def": "Software as a Service - logiciel en abonnement (Shopify, Salesforce...)"}, {"term": "SKU", "def": "Stock Keeping Unit - référence produit unique"}, {"term": "TAM / SAM / SOM", "def": "Total/Serviceable/Obtainable Market - tailles de marché (utile en pitch)"}, {"term": "Take rate", "def": "Commission prélevée sur chaque transaction (ton 30% est un take rate)"}, {"term": "Unit economics", "def": "Économie unitaire : marge par transaction, par client, par salon"}, {"term": "YoY", "def": "Year over Year - comparaison d'une année sur l'autre"}], "WHO_IS_WHO": [{"company": "CHANEL", "people": "Chief Data Officer, Head of Retail, Market Research", "why": "Le luxe qui investit massivement dans la data et le clienteling. Parler data-driven luxury.", "conversation": "J'ai lu que CHANEL investissait beaucoup dans la data client et le clienteling en boutique. Comment articulez-vous l'IA avec l'experience ultra-premium que vos clients attendent ? Est-ce que la tech reste invisible chez vous ou elle fait partie de l'experience ?"}, {"company": "LVMH", "people": "Head of Retail Excellence, Directeur Grand Projet", "why": "Le plus grand groupe de luxe mondial. S'intéresse à l'excellence retail et à la tech.", "conversation": "Avec autant de maisons sous le meme groupe, comment partagez-vous les best practices retail entre les marques ? L'excellence retail est-elle centralisee ou chaque maison garde son ADN propre ?"}, {"company": "CARREFOUR", "people": "Head of Data & Analytics, Dir. Commercial France", "why": "Leader du retail media et de la data en France. Transformation digitale massive.", "conversation": "Carrefour Links est devenu une reference en retail media en France. Quel a ete le plus gros defi pour convaincre les marques d'investir dans votre plateforme publicitaire plutot que chez Google ou Meta ?"}, {"company": "INTERSPORT", "people": "CEO-PDG + 4 directeurs", "why": "Modèle coopératif, forte équipe présente. Intéressés par la satisfaction client et la formation.", "conversation": "Votre modele cooperatif est unique dans le sport. Comment gardez-vous une coherence d'experience client entre 600 magasins qui ont chacun leur gerant independant ? C'est un vrai challenge d'alignement."}, {"company": "CLARINS", "people": "Retail & E-com Director, CRM, Retail France", "why": "Beauté premium. Experts en clienteling et CX. Proches de ton univers (beauté).", "conversation": "J'ai cru comprendre que Clarins avait deploye un chatbot IA et du clienteling avance. Dans un univers beaute ou le conseil humain est sacre, comment dosez-vous le digital vs l'humain en point de vente ?"}, {"company": "PROVALLIANCE", "people": "CEO + 9 directeurs (Franck Provost, Fabio Salsa)", "why": "LA plus grande délégation. Réseau de SALONS. Ce sont littéralement tes prospects ou partenaires potentiels !", "conversation": "Avec 1000+ salons et 15 000 collaborateurs, votre Academie de Formation est impressionnante. Quel est votre plus grand apprentissage sur la fidelisation des coiffeuses et estheticiennes ? C'est un sujet qui me parle directement, je travaille avec 450 salons."}, {"company": "CASTORAMA / KINGFISHER", "people": "Marketplace + Retail Media + Data", "why": "Pionniers du retail media et marketplace en France. Bons interlocuteurs sur la monétisation.", "conversation": "Votre strategie retail media Kingfisher est montee tres vite. Concretement, comment un fournisseur decide-t-il de basculer son budget pub chez vous plutot que sur Google Shopping ? Quel est l'argument qui tue ?"}, {"company": "SCHMIDT GROUPE", "people": "10 directeurs présents !", "why": "Plus grosse équipe après Provalliance. Cuisine/aménagement. Focus sur l'expérience client et l'innovation.", "conversation": "Votre visite virtuelle 3D des cuisines avant devis, c'est du phygital pur. Quel impact ca a eu sur le taux de transformation en magasin ? Les clients viennent-ils plus decides apres la 3D ?"}, {"company": "BOULANGER", "people": "Data & IA + Franchise", "why": "Référence en data retail et franchise. Peut t'inspirer sur l'animation réseau.", "conversation": "Votre equipe Data & IA a une approche tres operationnelle, classification produit, reco personnalisee. Quel use case IA vous a le plus surpris en termes de ROI ? Et lequel a ete un echec instructif ?"}, {"company": "LES GEORGETTES", "people": "Président + 5 directeurs", "why": "BIJOUX ! Ton concurrent/homologue le plus direct. À rencontrer absolument.", "conversation": "En tant que createur de bijoux avec une forte presence TikTok, votre strategie micro-influenceurs m'interesse enormement. Quel ratio influenceurs macro vs micro fonctionne le mieux pour vous en conversion ?"}]};
