<script>
var DATA={"MODULES": [{"id": "ia-data", "icon": "🤖", "title": "IA & Data dans le Retail", "color": "from-purple-600 to-indigo-700", "tagline": "Le sujet n°1 du Spot. De ChatGPT au pricing dynamique.", "days": [{"day": 1, "title": "L'IA générative : comprendre la révolution", "content": "L'IA générative (GenAI) désigne les modèles capables de créer du contenu : texte, image, code, vidéo. GPT-4, Claude, Gemini, Mistral en sont les fers de lance. Pensez-la comme un assistant ultra-intelligent qui apprend les patterns et peut les recréer pour des cas similaires. Si tu décris un produit une fois, l'IA peut en générer 1000 variations.\\n\\n**Pourquoi le retail est obsédé par l'IA en 2026 :**\\n- Personnalisation à grande échelle (recommandations produit, emails ciblées au profil)\\n- Automatisation du service client (chatbots résolvent 40-60% des demandes sans humain)\\n- Génération de fiches produit, visuels, descriptions SEO en masse\\n- Prévision de la demande et optimisation des stocks (-20% de surstock chez les early adopters)\\n- Pricing dynamique qui ajuste les tarifs en temps réel selon la demande\\n\\n**Le chiffre clé :** 72% des retailers français ont lancé au moins un projet IA en 2025 (source McKinsey Retail). Les early adopters constatent +15 à 30% de productivité sur les tâches automatisées. Carrefour ? Ils utilisent l'IA pour générer automatiquement les fiches produit de leurs 600 000+ références. C'est pas du storytelling, c'est du scale produit.\\n\\n**Cas concret : Boulanger & son équipe Leaders Data et IA :**\\nBoulanger (pré-envergure avec présence au Spot) a une équipe dédiée qui utilise l'IA pour la classification des produits, la détection de fraude, la recommandation personnalisée. Résultat ? Taux de conversion +12% sur leur e-commerce.\\n\\n**Cas CHANEL : l'IA en mode luxe**\\nChanel a un Chief Data Officer. Mais contrairement à Carrefour (data de masse), Chanel utilise l'IA pour comprendre les tendances esthétiques, segmenter ultra-finement sa clientèle ultra-premium, et générer des visuels moodboard d'inspiration. L'IA n'y est pas un outil d'effica, c'est un outil de prestige et de compréhension de désir.\\n\\n**Ce que ça change pour toi (bijoux en dépôt-vente) :**\\n- L'IA peut optimiser tes tournées (quel ordre de salons pour minimiser le km). Google Maps API avec Machine Learning.\\n- Prédire quels salons vendent le mieux quel type de bijou, selon la saison, la localisation, la clientèle.\\n- Générer automatiquement des descriptions pour ta newsletter, tes emails marketing.\\n- Analyser tes ventes et identifier les patterns (ex : les bagues se vendent mieux en hiver, les colliers en été).\\nC'est un levier de scaling sans augmenter ta charge de travail.\\n\\n**APPROPRIATION DÉPÔTS GEMMES :**\\n1. **ChatGPT pour les descriptions produit** : Tu photographies un bijou, tu demandes à ChatGPT « Écris une description accrocheur de 100 mots pour cette bague acier 18-20€, style bohème ». En 30 secondes, c'est fait. Ensuite, tu l'envoies à tes salons dans un mini-catalogue digital.\\n2. **Générer du contenu social pour les salons** : « Invente 5 captions Instagram pour promouvoir les bijoux Dépôts Gemmes. Ton audience ce sont des femmes 25-45 ans ». L'IA te crache 5 options. Les coiffeuses les partagent, tu divises ton effort marketing par 10.\\n3. **Utiliser ChatGPT pour analyser tes données de vente** : Tu mets tes chiffres (combien de bagues vendues par salon, par période) et demandes à l'IA : « Quels sont les patterns ? ». Elle identifiera que le salon de Nice vend 3x plus de colliers qu'en moyenne, que la bague bleu-ciel a un taux de casse anormalement élevé.\\", "keyTerms": ["IA générative", "LLM (Large Language Model)", "Prompt engineering", "RAG (Retrieval Augmented Generation)", "Fine-tuning"], "quiz": [{"q": "Que signifie 'GenAI' dans le contexte retail ?", "options": ["Gestion Nationale de l'IA", "IA générative capable de créer du contenu", "Génération Automatique d'Inventaire", "Géolocalisation Neuronale Artificielle"], "correct": 1}, {"q": "Quel est le principal bénéfice de l'IA pour le retail en 2026 ?", "options": ["Remplacer 100% des employés", "Personnalisation à l'échelle et automatisation", "Créer des magasins sans humains", "Réduire les impôts"], "correct": 1}, {"q": "Quel % des retailers FR ont un projet IA en 2025 ?", "options": ["25%", "50%", "72%", "95%"], "correct": 2}]}, {"day": 2, "title": "Data : le pétrole du retail moderne", "content": "La data est au coeur de TOUTES les stratégies retail. Chanel a un Chief Data Officer, Carrefour un Head of Data & Analytics qui pilotent les décisions stratégiques. Ce n'est pas une mode, c'est la nouvelle réalité.\\n\\n**Les 3 types de data retail :**\\n1. **First-party data** : données collectées directement par toi (achats, clientes, CRM, programme fidélité). La plus précieuse car tu les possèdes. Pas de problème RGPD, pas de risque de fin des cookies.\\n2. **Second-party data** : données partagées entre partenaires (ex: données retail media de Carrefour qui revend de l'audience à des marques). Puissant mais moins controlé.\\n3. **Third-party data** : données achetées à des brokers externes. Légalement en déclin avec RGPD et la fin des cookies tiers. Les retailers s'en éloignent.\\n\\n**Cas Carrefour : Head of Data & Analytics**\\nCarrefour traite 3 milliards de transactions par an en France. Leur équipe de data utilise cela pour : comprendre les tendances par région, adapter l'assortiment magasin par magasin, prédire les pics de demande les jours de fête, et monétiser cette data via Carrefour Links (leur plateforme retail media). Leur Head of Data ne bosse pas pour « faire du reporting », il bosse pour générer du CA additionnel.\\n\\n**Data Lake vs Data Warehouse - Pourquoi c'est important :**\\nUn Data Lake stocke TOUT brut (logs, vidéos, fichiers) sans structure. Un Data Warehouse organise et nettoie pour l'analyse. Les retailers matures commencent par un Data Lake (capture massive) et créent des Data Warehouses pour les analyses spécifiques. Boulanger ? Ils capturent le comportement client en magasin (eye-tracking, dwell time) et le structurent ensuite pour optimiser le layout.\\n\\n**CDP (Customer Data Platform) :**\\nUn CDP unifie toutes les données client dispersées (CRM, achats en ligne, en magasin, réseaux sociaux) en UN profil 360° unique. Imagine : une cliente visite ton salon, essaie une bague, ne l'achète pas. Plus tard elle reçoit un email personnalisé sur ce modèle. Et quand elle revient au salon, la vendeuse sait déjà qu'elle a hésité. C'est le CDP. Boulanger, Clarins, Carrefour en sont équipés.\\n\\n**Cas Boulanger : segmentation de clients par data**\\nBoulanger segmente ses 5M de clients fidèles en 30+ clusters (exemple : « Gamers de 18-25 ans en petite ville » ou « Familles avec enfants cherchant du smart home »). Chaque segment reçoit des offres différentes. Résultat ? Taux de conversion email +25% vs approche générique.\\n\\n**CHANEL Market Research Manager : la data en mode luxe**\\nCHANEL collects data pas sur « combien de No.5 vendus » mais sur « quels clients achètent No.5 + Rouge Coco + Bijoux ? Quel est leur profil ? ». Ensuite ils créent des expériences ultra-exclusives pour ces micro-segments VIP. La data sert à créer du désir, pas juste à vendre plus.\\n\\n**Pour ton business :**\\nTes données de vente par salon sont ton or premier. Tu dois la structurer :\\n- **Par bijou** : bague X vendue 45 fois en 45 jours dans 450 salons = 45/450 = 10% des salons vendent ce modèle en moyenne. Mais le salon à Nice ? 80%. Pourquoi ? Enquête-toi.\\n- **Par salon** : quel est ton top 10 des salons par CA ? Quel est le taux de rotation moyen ? La casse moyenne ?\\n- **Par saison** : les colliers vendent-ils mieux l'été ? Les bagues l'hiver ?\\n- **Par profil** : dans quel type de salon (spa 4-étoiles vs salon de quartier) la bijouterie perce-t-elle le mieux ?\\n\\n**APPROPRIATION DÉPÔTS GEMMES :**\\n1. **Structure tes 450-salon data dans Google Sheets ou Airtable** : colonnes = nom du salon, localisation (région), type (coiffure vs esthétique vs spa), CA / 45j, taux de rotation, taux de casse, dernier réapprovisionnement. Mises à jour mensuelles. Ça te prend 30min/mois, ça te donne une vision claire.\\n2. **Track ces KPIs** : (1) Taux de rotation = (nombre d'articles vendus entre 2 tournées) / 58 articles. (2) Panier moyen = CA total / nombre de bijoux vendus. (3) Taux de casse = nombre de bijoux endommagés / nombre de bijoux envoyés. (4) CA par salon par période.\\n3. **Utilise une formule simple pour identifier tes top performers** : Salons qui vendent + de 60% de la moyenne = VIP. À qui tu accordes peut-être une 3e tournée/mois, ou des nouveautés en exclusivité d'abord. Salons en dessous de 40% = risque d'attrition, besoin d'une intervention.\\", "keyTerms": ["First-party data", "CDP (Customer Data Platform)", "Data Lake", "Data Warehouse", "ETL (Extract Transform Load)", "Data-driven"], "quiz": [{"q": "Qu'est-ce que la first-party data ?", "options": ["Données achetées à Google", "Données collectées directement par l'entreprise", "Données du gouvernement", "Données de la concurrence"], "correct": 1}, {"q": "Qu'est-ce qu'un CDP ?", "options": ["Centre de Distribution Principal", "Customer Data Platform", "Content Delivery Protocol", "Chief Digital Position"], "correct": 1}, {"q": "Pourquoi la third-party data décline ?", "options": ["Elle coûte trop cher", "Fin des cookies tiers et réglementations RGPD", "Les consommateurs ne veulent plus de données", "Google a fermé"], "correct": 1}]}, {"day": 3, "title": "IA appliquée : les use cases concrets", "content": "Passons du concept à la pratique. Voici concrètement ce que font les leaders retail au Spot et comment l'IA s'applique à ton business.\\n\\n**Pricing dynamique (Transgourmet Head of Pricing au Spot)**\\nL'IA ajuste les prix en temps réel selon la demande, les stocks, la concurrence locale. Transgourmet (distributeur B2B) vend à 50 000+ restaurants. Ils utilisent le pricing dynamique pour fixer le prix des ingrédients en fonction de la saisonnalité (œufs + chers en hiver) et de la concurrence locale (prix du groupe Sodexo à proximité). Résultat : marge amélioration de 3-5% sans perdre de clients.\\n\\nAmazon ? Mythe urbain que ce soit 2,5M/jour. C'est plutôt 500K-1M ajustements/jour. Mais le principle tient : prix fluide = revenue optimale.\\n\\n**Cas Clarins : chatbot retail**\\nClarins a déployé un chatbot IA sur son site (et WhatsApp). Il répond aux questions sur les produits, les routines soins, la compatibilité (« Je suis peau sensible, quel sérum pour moi ? »). Le chatbot résout 45-55% des questions. Les 45-55% restants montent en escalade à un vrai vendeur. Avant ? 0% d'escalade, tout était filtré par email avec délai 24-48h. Maintenant : réponse en 10 secondes pour la majorité.\\n\\n**Visual merchandising IA & computer vision**\\nDes systèmes de computer vision analisent les photos de vitrines Decathlon (7 000+ magasins). L'IA détecte les zones chaudes (où les clients regardent = eye-tracking) vs froides (zones invisibles), et suggère des réarrangements du layout. Les retailers testent aussi l'IA pour détecter le vide stock en rayon en 30 secondes via une photo de phone.\\n\\n**Prédiction de la demande (ML appliquée)**\\nDecathlon + Kiabi utilisent le Machine Learning sur leurs historiques : données de vente + météo + tendances Google Trends + calendrier (vacances scolaires, soldes, fêtes) = prévisions de stock ultra précises. Resultat ? -15 à 20% de surstock, -10% de ruptures de stock (les fameuses « Oups, ce modèle est en rupture »).\\n\\nBoulanger applique cela aux produits électroniques où c'est critique : prédiction de la demande sur les console de gaming, les TV 4K avant les matchs du Mondial, etc.\\n\\n**Cas CHANEL : IA pour le luxe**\\nCHANEL utilise l'IA pour identifier les micro-tendances via analyse de photos Instagram, TikTok, Pinterest. Exemple : détection que « le rouge à lèvres glossé revient en 2026 » via agrégation d'images semaines avant que les trend reports payants ne le signalent. Avantage compétitif : ils pouvaient pré-commander du stock avant les concurrents.\\n\\n**IA pour toi (Dépôts Gemmes) :**\\n\\nImagne un modèle qui prédit quel type de bijou va performer dans quel type de salon. Tu as les données :\\n- Salon de spa 4-étoiles à Paris = colliers + bagues haut de gamme\\n- Salon de coiffure populaire en banlieue = petites boucles d'oreilles, prix accessibles\\n- Salon de montagne touristique = bijoux bohème, matériaux naturels\\n\\nAvec 450 points de données et 45 jours de cycles, tu as assez pour entraîner un simple modèle (même Excel suffît). Résultat : reappro intelligente, moins de casse, meilleur CA.\\n\\n**APPROPRIATION DÉPÔTS GEMMES :**\\n\\n1. **Optimisation des tournées avec Google Maps API** : Au lieu de faire tes tournées au hasard (salon A > salon B > salon C), demande à Google Maps : « Optimise ma route en partant de [adresse départ] et visitant ces 15 salons ». Économie : 1-2h par tournée, 10-20€ essence par journée. Sur 52 semaines, ça vaut 5 000-10 000€ annuels.\\n\\n2. **Prédiction simple de la demande en Excel** : Crée un tableau : semaine, salon, nombre de bagues vendues, nombre de colliers vendus. Regarde si une tendance se dessine (bagues d'hiver, colliers d'été). Ensuite, quand tu réapprovisionnes le salon pour la tournée suivante, tu ajustes le mix (ex : +30% de colliers en juillet, -20% de pulls en décembre si c'est cohérent).\\n\\n3. **Alertes de recommande automatisées** : Utilise un simple script Google Sheets ou Zapier : si le taux de rotation d'un bijou spécifique dépasse 80% (= le bijou se vend comme des petits pains), envoie-moi une alerte. Je vois que la bague modèle X vend à 90% dans 80 salons ? Je dois la commander d'urgence avant rupture.\\", "keyTerms": ["Pricing dynamique", "Computer Vision", "Machine Learning", "Prédictif", "NLP (Natural Language Processing)"], "quiz": [{"q": "Combien de fois Amazon change ses prix par jour ?", "options": ["1 000", "100 000", "2,5 millions", "10 millions"], "correct": 2}, {"q": "Quel % de requêtes un chatbot IA résout-il en moyenne ?", "options": ["10-20%", "40-60%", "80-90%", "100%"], "correct": 1}, {"q": "Le pricing dynamique utilise principalement :", "options": ["L'intuition du manager", "Des algorithmes basés sur demande, stocks et concurrence", "Un tirage au sort", "Le prix des matières premières uniquement"], "correct": 1}]}]}, {"id": "omnicanal", "icon": "🔄", "title": "Omnicanalité & Expérience Client", "color": "from-emerald-600 to-teal-700", "tagline": "Business Talk phare : 'Omnicanal sans couture, mythe ou réalité ?'", "days": [{"day": 1, "title": "Omnicanal : de quoi parle-t-on vraiment ?", "content": "L'omnicanalité, c'est LE buzzword du retail de 2026. Mais la plupart des enseignes galèrent encore à l'implémenter correctement. Au Spot, c'est un Business Talk principal : « Omnicanal sans couture, mythe ou réalité ? »\\n\\n**Multicanal vs Cross-canal vs Omnicanal - Les définitions :**\\n- **Multicanal** : présence sur plusieurs canaux MAIS en silos complets (site web + magasins + app, mais non connectés). Tu achètes en ligne, tu ne peux pas retirer en magasin. C'est la réalité de 60% des retailers en 2026.\\n- **Cross-canal** : les canaux commencent à parler (click & collect : acheter online, retirer en magasin dans 2h). Un vrai progrès mais pas fluide.\\n- **Omnicanal** : expérience complètement unifiée. Tu achètes online, tu peux changer ta commande en magasin, retourner en ligne. Ton panier, ton historique, tes préférences te suivent partout. C'est Decathlon, c'est Starbucks, c'est Sephora.\\n\\n**Cas Decathlon : le modèle omnicanal français**\\nDecathlon a 400+ magasins en France + e-commerce. Leur modèle : tu achètes sur l'app, tu retires en 2h au magasin le plus proche. Mais surtout, l'app te montre le stock en magasin en temps réel. Et en magasin, un vendeur peut commander pour toi sur sa tablette et te l'envoyer chez toi. C'est seamless. Decathlon a aussi des services circulaires : tu loues un vélo au lieu de l'acheter (Decathlon Occasion).\\n\\n**Cas Clarins Retail & E-commerce Director**\\nClarins a 500+ boutiques et un site e-commerce. Leur enjeu omnicanal : une cliente vient tester une crème en magasin, tombe amoureuse mais la trouve trop chère, repart. Clarins veut qu'elle reçoive un email la journée-même avec une offre de -15% si elle commande online, avec livraison gratuite. Et si elle revient au magasin, la vendeuse sait qu'elle envisageait cet achat et peut lui proposer un cadeau avec l'achat (sample gratuit). C'est du cross-canal orchestré.\\n\\n**Cas Groupe Eram (Eram, Texto, Bocage) : Directrice Digital et CRM**\\nGroupe Eram gère 3 marques de chaussures avec présence physique + e-com. Leur CRM cross-canal : une cliente achète des bottes en magasin Eram. Elle reçoit une reco email Texto (marque sœur) pour des ballerines complémentaires avec code de réduction. Achète en ligne, retrait possible en magasin Eram le plus proche. CELA c'est de l'omnicanal à scale.\\n\\n**Le \"sans couture\" (seamless) :**\\nC'est l'objectif ultime. Le client ne perçoit AUCUNE rupture entre online et offline. C'est transparent. C'est le sujet principal du Business Talk du Spot.\\n\\n**Les chiffres qui changent tout :**\\nLes retailers omnicanaux affichent un taux de rétention client 91% supérieur aux mono-canal (Harvard Business Review, 2024). Un client omnicanal dépense en moyenne 4x plus annuellement qu'un client qui achète sur un seul canal. Et l'important : les clients omnicanaux sont 3x plus enclins à recommander la marque.\\n\\n**Ton angle omnicanal (Dépôts Gemmes) :**\\nTes 450 salons partenaires = ton réseau physique ultra-dense (450 points de contact). C'est ton superbe atout. Mais tu n'as pas (encore) d'e-commerce. Comment les connecter ? Voici l'omnicanal pour toi :\\n\\n1. **QR code sur le présentoir** : client regarde les bijoux physiquement, scanne le QR code sur la vitrine > accès à un mini-site avec tout le catalogue, avis clients, tendances, prix.\\n2. **Click & Salon-vente** : client commande un bijou en ligne (pour éviter la rupture de stock), enlève et paye au salon lors de la prochaine visite.\\n3. **Donnée unifiée** : tu sais qu'une cliente a regardé les colliers au salon, n'a pas acheté, tu lui envoies un email personnalisé (tech possible avec une simple CRM).\\", "keyTerms": ["Omnicanal", "Seamless (sans couture)", "Click & Collect", "Ship-from-store", "BOPIS (Buy Online Pick-up In Store)", "Phygital"], "quiz": [{"q": "Quelle est la différence clé entre multicanal et omnicanal ?", "options": ["Le nombre de canaux", "L'unification et la fluidité entre canaux", "Le budget marketing", "La taille de l'entreprise"], "correct": 1}, {"q": "Un client omnicanal dépense en moyenne combien de plus ?", "options": ["2x", "3x", "4x", "10x"], "correct": 2}, {"q": "Que signifie BOPIS ?", "options": ["Business Online Platform for Internal Sales", "Buy Online Pick-up In Store", "Brand Optimization & Product Innovation System", "Best Online Price Indexing Service"], "correct": 1}]}, {"day": 2, "title": "Expérience client : créer du sens, de l'émotion, du service", "content": "C'est le titre exact du 4e Business Talk du Spot : « Créer du sens, de l'émotion, du service ». Les retailers n'ont pas compris : ils ne vendent plus des produits. Ils vendent des expériences.\\n\\n**Le concept d'expérience client (CX) :**\\nC'est la somme de TOUTES les interactions d'un client avec une marque : avant, pendant et après l'achat. Marketing > achat en magasin > email follow-up > SAV > rappel années plus tard. Chaque touchpoint renforce ou détruit la marque.\\n\\n**Les 4 piliers de la CX en 2026 :**\\n\\n1. **Personnalisation** : « Je te connais, je te comprends ». 80% des consommateurs achètent plus quand l'expérience est personnalisée. Sephora ? Quand tu rentres dans un magasin Sephora et tu as un compte, la vendeuse sait tes achats précédents, tes allergies, tes préférences. Elle ne te propose pas n'importe quoi. Elle te propose des variants de ce que tu aimes déjà.\\n\\n2. **Émotion** : Créer un lien affectif fort. Les marques qui créent de l'émotion ont un NPS (Net Promoter Score) 3x supérieur. Chanel crée de l'émotion via l'héritage (depuis 1910), la rareté, l'exclusivité. Un achat de rouge No.5 n'est pas un achat de produit, c'est un achat d'une histoire.\\n\\n3. **Sens / RSE** : Engagement sociétal. 67% des millennials et Gen-Z choisissent une marque pour ses valeurs, pas juste son produit. Typology (au Spot) = transparence totale sur les formules, pas de plastique. De Neuville (chocolatier) = agriculture équitable. C'est du branding qui colle à la jeunesse.\\n\\n4. **Service** : Au-delà du produit. Conseil, accompagnement, after-sales. Clarins offre des tests de peau gratuits. Decathlon prend tes retours sans conditions et sans questions. Le service c'est du rassurance.\\n\\n**Le clienteling (Sephora, Chanel, Clarins) :**\\nTechnique où le vendeur en magasin utilise les données client (historique d'achat, préférences, anniversaire) pour personnaliser l'accueil et le conseil.\\n\\nChanel ? Chaque client VIP a un « personal shopper » qui connaît ses couleurs préférées, sa taille, son style. Quand une nouvelle collection arrive, le personal shopper contacte les clients concernés en avant-première.\\n\\nSephora ? Via leur app, les vendeuses voient ton historique sur une tablette. Tu as acheté 3 palettes de fard à paupières Essense en 6 mois ? La vendeuse suggère une formation maquillage gratuite.\\n\\n**Cas Schmidt Groupe (10 personnes au Spot !)**\\nSchmidt Groupe gère des marques de mobilier + home décor. Leur Directeur Expérience Client & Digital a implémenté un CX global :\\n- Visite virtuelle 3D des cuisines avant le devis\\n- CRM qui trace ta visite magasin > mail suivi après 48h > offre personnalisée 10 jours après\\n- Programme fidélité où les « repeat buyers » reçoivent des upgrades gratuits (finition premium au prix standard)\\n\\n**Cas Intersport : Directeur Satisfaction Client**\\nIntersport gère 600+ magasins en France avec des vendeurs qui sont des sportifs passionnés. Leur CX stratégie : les vendeurs conseillent comme des amis, pas comme des vendeurs. Une cliente vient acheter un tapis de yoga ? Le vendeur raconte sa propre expérience yoga, l'invite à la classe community gratuite du magasin. C'est de l'émotion pure.\\n\\n**Chanel Head of Retail : l'or standard du luxe**\\nChanel investit énormément dans la formation des vendeurs (boarding 3-6 mois). Chaque vendeur Chanel est une gatekeep d'expérience. Elle connait l'histoire de chaque produit (le No.5 créé en 1922, pourquoi les 2 lites Coco, etc.). Acheter au Chanel, c'est pas acheter un produit, c'est être initié à un univers.\\n\\n**Ton angle CX (Dépôts Gemmes) :**\\n\\nTes coiffeuses/esthéticiennes SONT déjà tes clienteling agents. Elles connaissent leurs clientes depuis des mois ou des années. Elles savent qui a un rendez-vous important (mariage, entretien d'embauche), qui vient à quel rythme, qui aime quel style. Comment capitaliser ?\\n\\n**APPROPRIATION DÉPÔTS GEMMES :**\\n\\n1. **Former les coiffeuses comme « bijou conseil »** : c'est une courte formation (30min) où tu apprends à la coiffeuse à écouter avant de proposer. Cliente qui se marie en 3 mois ? Les coiffeuses proposent des bagues + colliers « mariage » (assortis, élégants). Cliente qui a un entretien important ? Petit collier professionnel qui renforce la confiance. Cela transforme un présentoir passif en outil de vente actif.\\n\\n2. **Crée des « bijou conseil » cards** : petites cartes plastifiées à côté du présentoir :\\n   - Collier XYZ = idéal pour peau claire, cheveux longs, style bohème\\n   - Bague ABC = inusable (acier), parfait cadeau anniversaire 30 ans, confiance\\n   - Boucles DEF = léger, discret, pour travail/bureau\\n   Ça aide la cliente à naviguer (et aussi la coiffeuse à conseiller sans improviser).\\n\\n3. **Personnalise les présentoirs par salon** : tes 450 salons ne sont pas identiques. Spa 4-étoiles à Deauville ? Plutôt colliers haut de gamme + bagues cocktail. Salon populaire en banlieue ? Plutôt petites boucles, colliers accessibles. Salon boho touristique ? Bijoux nature, asymétriques. L'IA peut t'y aider (voir jour 3 du module 1), mais au minimum, demande à chaque coiffeuse : « Quel style préfèrent tes clientes ? »\\", "keyTerms": ["CX (Customer Experience)", "NPS (Net Promoter Score)", "Clienteling", "Touchpoint (point de contact)", "Customer Journey", "Moment of Truth"], "quiz": [{"q": "Que mesure le NPS ?", "options": ["Le nombre de produits vendus", "La probabilité qu'un client recommande la marque", "Le nombre de nouveaux clients", "Le prix net des produits"], "correct": 1}, {"q": "Quel % de consommateurs achètent plus avec une expérience personnalisée ?", "options": ["40%", "60%", "80%", "95%"], "correct": 2}, {"q": "Qu'est-ce que le clienteling ?", "options": ["Vendre le plus possible", "Utiliser les données client pour personnaliser le conseil en magasin", "Fidéliser via des réductions", "Recruter de nouveaux clients"], "correct": 1}]}, {"day": 3, "title": "Phygital & Digital in Store", "content": "Le magasin physique n'est pas mort, il se réinvente profondément. Le phygital (fusion physique + digital) est la réalité 2026.\\n\\n**Technologies phygitales concrètes :**\\n\\n- **Bornes interactives** : étendre le catalogue « sans couture ». Tu montres 10 articles en magasin, la borne te montre les 5 000 autres du catalogue. Click & collect au salon possible (« Je commande et je reviens demain »). C'est l'Endless Aisle.\\n\\n- **RFID** : puce sur chaque produit. Fonction ultra basique = suivi des stocks en temps réel (« Quel stock exact de bagues à -10€ ai-je au salon Nice ? »). Fonction avancée = caisses automatiques (tu mets les articles dans un bac, tu sors, c'est payé automatiquement), anti-vol intelligent (alarme intelligente si quelqu'un essaie de voler, but soft-alarm pour pas faire la honte au client).\\n\\n- **Écrans dynamiques** : affichage promotionnel piloté par IA. Ex : en juillet, l'écran du présentoir bascule automatiquement en mode « colliers et boucles d'oreilles » (vendeurs l'été). En décembre, c'est « bagues cocktail + cadeaux ». Le contenu s'adapte sans intervention manuelle.\\n\\n- **Réalité augmentée** : essayage virtuel. Sephora l'utilise : regarde ton visage avec la caméra du phone et teste 50 fards à paupières virtuels. Atol (opticien) = essayer les lunettes virtuellement. Pour la bijouterie : essayer une bague virtuellement sur sa propre main avec caméra.\\n\\n- **QR codes** : pont simple et gratuit entre physique et digital. Code sur le présentoir > lien vers site marchand, avis clients, tutoriels de style.\\n\\n**Cas Castorama Marketplace Team (3 personnes au Spot)**\\nCastorama a un réseau de 80+ magasins + une plateforme marketplace. Leur stratégie phygital : \\n- Tu viens en magasin chercher du carrelage. Le modèle que tu veux est en rupture.\\n- Vendeur te propose sur sa tablette 5 alternatives du marketplace (vendeurs tiers). Tu en choisis une.\\n- Tu la commandes en 2 clics, livraison à ta maison ou retrait magasin.\\nLe magasin physique n'est plus une limite, c'est un hub.\\n\\n**Cas La Poste Merchandising Transformation (4 personnes au Spot)**\\nLa Poste a 17 000+ points de retrait. Enjeu : les points de retrait colis sont bruts, pas accueillants. Transformation phygital :\\n- Installation d'écrans numériques (information, timing, offres locales)\\n- Création d'une mini-curation de produits locaux à vendre (miel régional, artisanat local)\\n- Code QR pour acheter en ligne depuis le point de retrait\\nLa Poste transforme ses points de retrait en micro-retail hubs.\\n\\n**Le concept de « magasin média »**\\nLe point de vente devient un canal de communication et de contenu. On y diffuse pas juste les produits, on y crée de l'expérience. Castorama a des petits écrans qui montrent des tutos DIY (« comment poser du carrelage »). Leroy Merlin a une app AR qui te montre comment un meuble regarderait dans ta maison. C'est du contenu qui crée du désir ET facilite l'achat.\\n\\n**Le vendeur augmenté (phygital RH)**\\nÉquipé d'une tablette, le vendeur :\\n- Accède aux stocks temps réel (« Do you have this en taille M ? »)\\n- Voit l'historique client (« Vous aviez acheté X, voici Y qui se marie bien\\\")\\n- Peut commander en ligne pour le client (« Pas en magasin mais je vous le commande, livré demain »)\\n- Peut faire crédit client via une signature tablette\\nC'est la fusion humain (empathie, conseil) + tech (info, efficacité).\\n\\n**Ton angle phygital (Dépôts Gemmes) :**\\n\\nUn présentoir classique c'est statique : 58 bijoux, c'est tout. Un présentoir phygital transforme complètement le jeu.\\n\\n**APPROPRIATION DÉPÔTS GEMMES :**\\n\\n1. **Le présentoir intelligent minimaliste** : 58 bijoux physiques + une petite tablette en bas du présentoir (iPad mini, 200€). La tablette affiche :\\n   - Les avis clients (« Ces bagues sont belles et durables »)\\n   - Les tendances (« Les colliers longs sont #1 cet été »)\\n   - Un lien vers ton site (si tu en as)\\n   - Un QR code pour se mettre sur ta newsletter\\n   Ça triple l'engagement sans changer le présentoir lui-même.\\n\\n2. **NFC tags sur les bijoux** : Une petite puce NFC (5€ chaque, ça coûte rien) insérée discrètement dans le bijou. Cliente scanne avec son téléphone > elle arrive sur une page avec :\\n   - Photos du bijou de toutes les angles\\n   - Détails matière (acier inoxydable, durée de vie, résistant à l'eau)\\n   - Avis clients de filles qui l'ont acheté\\n   - Un code promo si elle achète cette semaine\\n   Transformation invisible mais ultra-puissante. Et ça coûte ~5€ par bijou en setup one-time.\\n\\n3. **Instagram-ready display design** : Les présentoirs Dépôts Gemmes ne ressemblent à aucun présentoir de salon = photo-digne de Instagram. Design épuré, éclairage soigné, couleurs harmonieuses. Les clientes qui essaient les bijoux les prennent en selfie > postent automatiquement > marketing gratuit. C'est du earned media phygital.\\", "keyTerms": ["Phygital", "Endless Aisle", "RFID", "Digital Signage", "Vendeur augmenté", "Magasin média"], "quiz": [{"q": "Que signifie 'Endless Aisle' ?", "options": ["Un magasin sans fin", "Étendre le catalogue magasin via le digital", "Un rayon qui ne se vide jamais", "Une allée réservée au e-commerce"], "correct": 1}, {"q": "La RFID permet principalement :", "options": ["De diffuser de la musique", "Le suivi des stocks en temps réel", "De payer par carte", "D'envoyer des SMS aux clients"], "correct": 1}, {"q": "Qu'est-ce qu'un vendeur augmenté ?", "options": ["Un vendeur avec un exosquelette", "Un vendeur équipé d'outils digitaux pour mieux servir le client", "Un robot qui remplace le vendeur", "Un vendeur qui travaille plus d'heures"], "correct": 1}]}]}, {"id": "retail-media", "icon": "📺", "title": "Retail Media & CRM", "color": "from-orange-500 to-red-600", "tagline": "Le marché qui explose : quand les retailers deviennent des médias.", "days": [{"day": 1, "title": "Retail Media : le nouveau eldorado", "content": "Le retail media est LE sujet business de 2025-2026. Le marché représente déjà 45 milliards $ dans le monde et croît de +25%/an en France et EMEA. C'est une explosion stratégique.\\n\\n**Définition simple :**\\nLe retail media c'est quand un retailer vend de l'espace publicitaire sur ses propres canaux : site web, app mobile, écrans en magasin, emails, SMS.\\n\\nExemple : tu vas sur Amazon.fr pour chercher un aspirateur. Le premier résultat est un aspirateur avec un petit badge « Sponsored ». Amazon a vendu cet espace pub à un fabriquant d'aspirateurs pour 1 000€/mois. C'est du retail media.\\n\\n**Pourquoi c'est révolutionnaire :**\\n\\n1. **First-party data fortress** : Le retailer possède les données d'achat réelles (QUI achète QUOI, à quelle fréquence, montant). Les marques rêvent d'y accéder. Plus besoin d'acheter de la third-party data incertaine.\\n\\n2. **Ciblage ultra-précis** : Au lieu de faire une pub générique pour atteindre « femmes 25-40 ans », le retailer peut vendre une pub hyper-ciblée : « femmes qui ont acheté des cosmétiques haut de gamme 3 fois en 6 mois, localisation Île-de-France ». ROAS dément.\\n\\n3. **Marges énormes** : 70-80% de marge brute. C'est du pur profit car le retailer a déjà l'audience (coûts techniques proches de zéro).\\n\\n4. **Lock-in** : Une fois que les marques achètent des pubs retail media, elles reviennent chaque mois (addiction à la performance). C'est un business récurrent.\\n\\n**Cas Kingfisher (Castorama + Brico Dépôt + Screwfix) : Directrice Retail Media + Head of Data & Monetisation**\\nKingfisher a lancé sa plateforme retail media en 2023. Modèle :\\n- Marques (Bosch, Makita, etc.) vendent des outils chez Kingfisher\\n- Bosch paie Kingfisher pour que ses produits « Bosch 20V Perceuse » apparaissent en top des résultats de recherche sur le site Castorama\\n- Castorama sait que les gens qui achètent une perceuse = cible parfaite pour batteries, embouts, etc. Elle vend des pubs segmentées à ces audiences à des marques tierces\\n- Revenue de retail media en 2024 : estimé 50-100M€ pour Kingfisher Europe\\n\\n**Carrefour Links : la référence française**\\nCarrefour a lancé Carrefour Links (très proche de Criteo, Platform d'Amazon Ads). Stratégie :\\n- Marques (LVMH, Nestlé, P&G, etc.) achètent de la visibilité sur Carrefour.fr\\n- Carrefour segmente aussi ses audiences par magasins physiques (oui, Carrefour vend des pubs pour que d'autres marques te personnalisent les offres en magasin aussi)\\n- Revenue potentiel : 200-300M€/an pour Carrefour seul (projet ambitieux)\\n\\n**Sephora Media (Head of Media au Spot)**\\nSephora a lancé Sephora Media. Marques (parfums, maquillage) paient pour apparaître en haut des résultats sur Sephora.fr et l'app. Exemple : une marque de fond de teint paie pour que sa fiche produit soit \\\"sponsorisée\\\" aux filles qui ont consulté des bases de teint sans acheter. Conversion +40%.\\n\\n**Le retail media c'est quoi pour les acteurs au Spot :**\\n- Kingfisher : Directrice Retail Media FR + Head of Data & Monetisation (2 rôles)\\n- Carrefour : Head of Data & Analytics + implicit retail media strategy\\n- Sephora : Head of Media (rôle créé récemment)\\n- Auchan, Leroy Merlin, Monoprix : en phase build\\n\\n**Pour toi (Dépôts Gemmes) :**\\n\\nTU ES DÉJÀ UN MICRO-RÉSEAU DE RETAIL MEDIA.\\n\\nTes 450 présentoirs dans 450 salons = 450 points de contact premium. Tes clientes regardent tes bijoux. Elles les essaient. Elles achètent ou non. Cette audience est PRÉCIEUSE pour d'autres marques complémentaires.\\n\\n**APPROPRIATION DÉPÔTS GEMMES :**\\n\\n1. **Identifie les marques complémentaires** : qui voudrait accéder à tes 450 audiences ? \\n   - Marques de soins (Clarins, Typology, Caudalie) pour cross-sell : une fille qui achète des bijoux = fille qui prend soin de sa peau\\n   - Marques de maquillage pour les yeux/lèvres (Essense, Urban Decay) : assortir les bijoux à un look make-up\\n   - Marques d'accessoires (foulards, ceintures, sacs petits formats) : complément de style\\n   - Marques de parfum haut de gamme (Chanel, Dior) : même clientèle, même ticket moyen\\n\\n2. **Monétise ta visibilité** : Au lieu de payer pour promouvoir les bijoux, demande à ces marques complémentaires de payer pour la visibilité :\\n   - Petit sampler de crème Clarins sur le présentoir (1€ coût, 50€ revenue de Clarins) = marge de 49€\\n   - Code QR de marque partner = 50 clics vers site, 1-2% conversion = 500-1000€ revenue pour Dépôts Gemmes\\n   - Affichage sur ton présentoir/newsletter = placement payant\\n   Revenue potentiel : 50€ par salon x 450 = 22 500€/an. C'est additionnel, non-invasif.\\n\\n3. **Marketplace concept** : Imagine : ton présentoir n'affiche plus que 30 bijoux Dépôts Gemmes + 28 produits d'autres marques (en consignment, c'est-à-dire ils te paient une commission). Ça augmente la richesse du présentoir + diversifie ton revenue. Cas similaire : Colette à Paris avait des bijoux, des cosmétiques, du prêt-à-porter, des livres, tout curaté. Revenue = plus d'une source.\\", "keyTerms": ["Retail Media", "First-party data", "ROAS (Return On Ad Spend)", "Monetisation", "Walled Garden", "Sponsored Products"], "quiz": [{"q": "Quelle est la marge brute typique du retail media ?", "options": ["20-30%", "40-50%", "70-80%", "95%"], "correct": 2}, {"q": "Pourquoi le retail media est-il si puissant ?", "options": ["Il est gratuit", "Le retailer possède les données d'achat first-party", "Il remplace la TV", "Il utilise des influenceurs"], "correct": 1}, {"q": "Le retail media croît de combien par an ?", "options": ["+5%", "+10%", "+25%", "+50%"], "correct": 2}]}, {"day": 2, "title": "CRM & Marketing Automation", "content": "Le CRM (Customer Relationship Management) est le système nerveux de la relation client en 2026.\\n\\n**CRM en 2026 - L'ère de l'hyper-personnalisation :**\\nOn ne parle plus d'envoyer le même email générique à 100K personnes. On parle de scénarios automatisés, ultra-personnalisés, déclenchés par le comportement exact du client.\\n\\nExemple : une fille achète un collier doré. 3h plus tard, elle reçoit un email : « Tu as aimé notre collier doré. Voici 3 boucles d'oreilles qui le complètent ». Click-rate 3x supérieur aux emails génériques.\\n\\n**Marketing Automation - Les fondamentaux :**\\n\\n- **Trigger** : un événement déclenche automatiquement une action. Achat bijou > email remerciement J+0 > email asking for avis J+7 > email offre fidélité J+30 > email hors-saison J+60 (« Tu as acheté l'été, voici des cadeaux pour Noël »)\\n\\n- **Scoring** : chaque client reçoit un score d'engagement (0-100). Points pour : ouverture email (+2), clic (+5), achat (+50), visite du site (+1). Score élevé = client à haute valeur, risque zéro. Score bas = client endormi, besoin de réactivation.\\n\\n- **Segmentation** : au minimum RFM (Récence = quand dernier achat, Fréquence = nb achats/an, Montant = total CA client). Exemple : segment « hautes valeurs » = achètent souvent ET dépensent beaucoup = traitement VIP. Segment « nouveau » = 1er achat < 3 mois = nurturing agressif pour fidélisation.\\n\\n**Les outils clés en 2026 :**\\n- **Salesforce** : le géant, pour grandes orga\\n- **HubSpot** : très populaire, interface simple, free version viable\\n- **Brevo** (ex-Sendinblue, français !) : moins cher, focus email automation\\n- **Klaviyo** : spécialisé e-commerce\\n\\n**Cas Easy Cash (6 personnes marketing/CRM au Spot)**\\nEasy Cash est une chaîne d'achat/vente d'objets d'occasion. Leur CRM B2C challenge : clients qui revendent des objets. Stratégie CRM :\\n- Tracking du client : combien d'objets il a vendus, son rating de sérieux\\n- Segmentation : VIP sellers (100+ transactions) reçoivent un bonus surprise\\n- Automation : si le client a vendu 3 objets en 2 mois, cela déclenche un email : « Tu es vendeur actif ! Voici comment multiplier tes ventes »\\n- Résultat : retention +30% des vendeurs\\n\\n**Cas Showroomprivé : Chief Growth Officer + Directeur CRM**\\nShowroomprivé (ventes privées online) a un CRM sophistiqué :\\n- Clienteling hyper-granulaire : connait tes préférences de marques, talles, couleurs, prix\\n- Automation : si tu as ajouté un article au panier sans l'acheter, tu reçois un email « le produit est à -25% maintenant »\\n- Gamification : points fidélité convertibles en réductions\\n- Résultat : customer lifetime value +2.5x vs moyenne e-commerce\\n\\n**Cas Groupe Eram : CRM strategy cross-brands**\\nGrou Eram gère Eram, Texto, Bocage (3 marques chaussures). CRM stratégie :\\n- Profil unifié : cliente a acheté bottes Eram ? Elle reçoit reco Texto. Elle ignore Bocage ? Pas de mails Bocage.\\n- Trigger intelligent : achat avant Noël ? Reco cadeau. Achat avant l'été ? Reco sandales.\\n- Attribution : savoir quel email a généré l'achat (marketing mix modeling)\\n\\n**Taux de référence en 2026 :**\\n- Taux d'ouverture email : 20-25% (bon), 30%+ (excellent)\\n- Taux de clic : 2-5%\\n- Taux de conversion email : 1-3%\\n- Unsubscribe rate : < 0.5% (si > 1%, c'est que tu spams)\\n\\n**Ton business B2B (Dépôts Gemmes) :**\\n\\nTu n'as probablement pas de CRM client final (les clientes des salons qui achètent les bijoux). Mais tu DOIS avoir un CRM B2B : tes 450 salons partenaires.\\n\\n**APPROPRIATION DÉPÔTS GEMMES :**\\n\\n1. **Build a salon CRM in HubSpot Free** :\\n   - Chaque salon = un contact (nom, adresse, vendeuse, email, phone)\\n   - Custom fields : CA/45j, taux rotation, taux casse, date dernier réappro, type de salon (spa/coiffure/esthétique), feedback\\n   - Score : salons avec CA > 2000€/45j et rotation > 70% = top performers (VIP treatment). Salons < 800€/45j = risk (intervention needed)\\n\\n2. **Automation : relance intelligente** :\\n   - Si un salon n'a pas reçu de réapprovisionnement en 50 jours (vs cycle normal 45j) = déclenchement auto email : « Hi [salon name], tes bijoux arrivent demain »\\n   - Si taux de casse > 20% = email alerte + coaching : « Voici comment ranger les bijoux pour réduire la casse »\\n   - Si CA a chuté -30% vs mois précédent = email check-in : « On remarque une baisse. Besoin d'aide ? »\\n\\n3. **Segmentation et traitement différencié** :\\n   - VIP Salons (top 10%, CA > 2500€/45j) : appel perso/mois, accès prioritaire aux nouvelles collections, bonus commission\\n   - Core Salons (moyen) : email/mois, réappro regulière\\n   - At-Risk Salons (bottom 10%) : visite terrain + possible restructuration (moins de bijoux, nouveau design preshow)\\n\\n4. **Marketing Automation pour fidélité** :\\n   - Chaque réappro = email de remerciement + stats de performance (ton salon a vendu 42 bijoux ce cycle, bravo !)\\n   - Top performer du mois reçoit surprise (bonus + featured dans newsletter)\\n   - Email trimestriel : « voici tes stats + benchmark vs autres salons »\\", "keyTerms": ["CRM", "Marketing Automation", "RFM (Récence Fréquence Montant)", "Lead Scoring", "Trigger", "Churn (attrition)"], "quiz": [{"q": "Que signifie RFM ?", "options": ["Retail Franchise Management", "Récence, Fréquence, Montant", "Return on Financial Marketing", "Revenue from Markets"], "correct": 1}, {"q": "Un bon taux d'ouverture email est de :", "options": ["5-10%", "20-25%", "50-60%", "80%+"], "correct": 1}, {"q": "Qu'est-ce qu'un trigger en marketing automation ?", "options": ["Un déclencheur d'action automatique", "Un type de publicité", "Un outil de design", "Une technique de négociation"], "correct": 0}]}, {"day": 3, "title": "Fidélité augmentée & Wallets", "content": "Les programmes de fidélité classiques (carte plastique avec points) sont techniquement morts en 2026. Place à la fidélité augmentée et phygitale.\\n\\n**Les nouvelles tendances de fidélité :**\\n\\n- **Fidélité émotionnelle** : créer de l'attachement psychologique au-delà des points. Communauté, contenu exclusif, early access aux produits. Exemple : Sephora Beauty Insider n'est pas juste des points, c'est une tribu avec tutoriels vidéo, communauté online, accès à des events VIP en magasin.\\n\\n- **Gamification** : challenges, badges, niveaux de prestige. Starbucks est la référence mondiale : tu as Starbucks, Starbucks Silver, Gold, Platinum. Chaque level = bénéfices additionnels. Psychologiquement, tu veux monter de niveau. Et tu as des challenges hebdos (« 5 achetés cette semaine = 50 bonus points »).\\n\\n- **Cashback** : retour en euros réels plutôt qu'en points abstraits (plus transparent). Payback, Jusqu'à, etc. « Chaque achat = 5% retour sur ton compte ». C'est plus clair que « 100 points = ?€ ».\\n\\n- **Wallets mobiles** : Apple Wallet, Google Wallet dématérialisent la carte. Plus de plastique. Mais surtout : capacité de push notifications géolocalisées. Client passe devant le magasin > notification avec une offre exclusive. Taux d'engagement 10x supérieur aux emails classiques.\\n\\n**Le wallet comme hyper-canal de communication :**\\nUne carte dans Apple Wallet peut envoyer des notifications push géolocalisées ultra-ciblées. Exemple Starbucks : client sort du boulot à 17h dans le 6e arrondissement > notification : « Bienvenue au Starbucks Latin Quarter ! Double points jusqu'à 19h ». Taux de visite induit : +40%. Pourquoi ? C'est timely + localisé + relevant.\\n\\n**Cas Intersport : communauté + sport**\\nIntersport a un programme fidélité lié à l'engagement sportif. Tu peux tracer tes running avec l'app Strava, partager tes défis, gagner des points que tu convertis en réductions Intersport. C'est pas juste du commerce, c'est une communauté autour du sport. Retention : +45% vs retail normal.\\n\\n**Cas Clarins Loyalty Program**\\nClarins a un programme tiered (bronze/silver/gold). Gold members reçoivent un cadeau d'anniversaire (sample de soin haut de gamme), accès early aux produits limités, invitations à des ateliers. CLV (customer lifetime value) des Gold members = 3x vs members standards.\\n\\n**Cas Kiabi Engagement**\\nKiabi (mode accessible) a un programme simple : chaque achat = points. Mais surtout, ils gamifient : « T-shirt kid acheté = challenge : fais-nous voir la photo de ton enfant dedans ». UGC + engagement. Les clientes postent des photos, ça crée de la communauté.\\n\\n**Programmes à succès 2026 :**\\n- **Sephora Beauty Insider** : 3 niveaux, communauté online active, magazines, events\\n- **Decathlon** : cashback transparent + possibilité de louer au lieu d'acheter\\n- **Intersport** : lien au sport, challenges, communauté\\n\\n**Ton angle fidélité (Dépôts Gemmes) :**\\n\\nTu dois créer un mini-programme fidélité pour les clientes finales (qui achètent tes bijoux dans les salons). C'est LA clé pour fidéliser et augmenter le ticket moyen.\\n\\n**APPROPRIATION DÉPÔTS GEMMES :**\\n\\n1. **Crée un wallet-based loyalty program** :\\n   - QR code sur le présentoir : scanne > inscription au programme Dépôts Gemmes\\n   - L'app (ou juste un lien mobile) enregistre ses achats (coiffeuse scanne à la caisse, ou cliente ajoute manuellement)\\n   - Chaque bijou acheté = points (1€ achat = 5 points)\\n   - 100 points = réduction 10€ sur achat suivant\\n   - Wallet notification : quand le présentoir est réapprovisionné avec des nouveautés, elle reçoit une notification : « Nouvelles bagues arrivées au [salon name] ! »\\n\\n2. **Tiering pour progression** :\\n   - Bronze (< 100€ lifetime) : accumule points\\n   - Silver (100-300€ lifetime) : +10% points bonus + early access aux nouveautés\\n   - Gold (> 300€ lifetime) : +20% bonus + cadeau surprise Noël + invitation exclusif event (ex : présentation de la collection SS2027)\\n   Psychologiquement, une cliente Bronze veut devenir Silver veut devenir Gold. Ça crée de la progression.\\n\\n3. **Referral program entre salons** :\\n   - Chaque cliente qui accumule 300€ (Gold) reçoit : « Invite ta copine au [autres salons de la network] et reçois 50 points bonus »\\n   - Ça crée de la virualité inter-salons, plus de brand awareness\\n\\n4. **Communication wallet** :\\n   - Push notification régulière (1x/semaine max) : \\\"Tes points expirent dans 2 mois, utilise-les !\\\" ou \\\"La bague que tu regardais l'autre jour est en promos ce weekend\\\"\\n   - Email anniversaire : \\\"C'est ton anniversaire ! -15% sur ta prochaine bague\\\"\\n   - Seasonal : \\\"T'as acheté des colliers cet été. Voici des cadeaux pour l'automne\\\"\\n\\nTa fidélité est la clé pour transformer des achats one-time en comportement récurrent. Budget pour setup : ~500€ en plateforme simple (Wisepops, Rewardify). Revenue généré : repeat-purchase rate +25-30%, ticket moyen +15%.\\", "keyTerms": ["Fidélité augmentée", "Wallet mobile", "Gamification", "Cashback", "CLV/LTV (Customer Lifetime Value)", "Retention rate"], "quiz": [{"q": "Quel est l'avantage principal du wallet mobile ?", "options": ["C'est gratuit", "Notifications push géolocalisées avec engagement 10x supérieur", "Il remplace la carte bancaire", "Il est obligatoire en 2026"], "correct": 1}, {"q": "La fidélité émotionnelle se base sur :", "options": ["Les réductions uniquement", "L'attachement, la communauté, le contenu exclusif", "Les points de fidélité", "La fréquence d'achat"], "correct": 1}, {"q": "CLV signifie :", "options": ["Client Level Verification", "Customer Lifetime Value", "Credit Line Validation", "Commercial Lead Volume"], "correct": 1}]}]}, {"id": "social-branding", "icon": "📱", "title": "Social Media & Branding", "color": "from-pink-500 to-rose-600", "tagline": "Du contenu qui engage, des marques qui rayonnent.", "days": [{"day": 1, "title": "Social Commerce & contenus en 2026", "content": "Le social commerce (vente directe intégrée aux réseaux sociaux) pèse 1 200 milliards $ en 2026 dans le monde. C'est le + rapide croissance segment ecommerce.\\n\\n**Les tendances sociales qui explosent :**\\n\\n- **TikTok Shop** : la révolution 2024-2026. Achat intégré directement dans le feed TikTok. Pas besoin de quitter l'app pour payer. Les bijoux sont l'une des top 3 catégories (avec cosmétiques et vêtements). Une fille regarde un unboxing de bagues TikTok > swipe up > achat immédiat > reçoit en 3 jours. Friction zéro.\\n\\n- **Instagram Reels + Checkout** : Instagram a copié TikTok Shop. Marketer poste un Reel de 15 sec showcasing un bijou > tag shoppable directement sur le reel > achat 1-click. Conversion rate = 5-8%, très élevé.\\n\\n- **Live Shopping (Livestream commerce)** : C'est énorme en Asie (Alibaba, WeChat), en croissance rapide en Europe. Un influenceur fait un live 20 minutes : « Je teste ces bagues ». Pendant, les viewers achètent en direct via un lien live. Volume transactionnel : 1-2 ventes par minute pendant le live. C'est viral.\\n\\n- **UGC (User Generated Content)** : contenu créé par les clients est 9,8x plus impactant que contenu de marque. Pourquoi ? Parce que c'est authentique. Une vraie fille portant la bague dans son quotidien > plus convaincant qu'une pub marchande.\\n\\n- **Short-form video addiction** : Reels (Instagram), TikTok, Shorts (YouTube). Format royal. 15-60 secondes. Attention span des jeunes = 6-8 sec. Passer le threshold = ton vidéo explose.\\n\\n**Cas Citadium (Directrice Marketing au Spot)**\\nCitadium (mode urbaine, cult) a une stratégie TikTok acharné. Ils postent 1 vidéo/jour de styling astuces (comment mixer les pièces Citadium). Followers = 800K sur TikTok. Conversion : 2-3% des cliques mènent à achat. Monthly social commerce revenue = 200-300K€ pour Citadium.\\n\\n**Cas Pimkie Digital Marketing Team**\\nPimkie (mode accessible, jeune) alimente constamment son Instagram Reels avec looks. Every Reel est shopable. Tactic : tag 5-7 produits Pimkie dans chaque reel, mix entre basic + nouveautés. Followers : 2.5M. Engagement rate : 8-12%. Social commerce = 15% de leur revenue total (ecommerce + magasins).\\n\\n**Cas Les Georgettes : jewelry brand social strategy**\\nLes Georgettes (créateur français de bijoux cools, présent au Spot) utilise TikTok comme canal principal. Postent des « before/after » (client bare vs client avec bijou). Creator marketing : collaborent avec 100+ micro-influenceurs (5K-50K followers chacun). Cost per click = très bas (50-100€ pour 1000 clics). Conversion rate = 3-5%. ROAS = 4-6x. C'est rentable.\\n\\n**Les métriques qui tuent en social commerce :**\\n- **Engagement rate** = (likes + comments + shares + saves) / followers. >5% = excellent. Benchmark = 1-3%.\\n- **Conversion rate** = achats / clics shop. 1-3% = good, 5%+ = excellent.\\n- **CPM** = coût pour mille impressions. TikTok ads = 3-8€ CPM. Instagram = 5-15€ CPM.\\n- **ROAS social** = revenue / spend pub. 3x+ = rentable. 5x+ = business grower.\\n\\n**Ton angle micro-influenceur (Dépôts Gemmes) :**\\n\\nLes coiffeuses et esthéticiennes SONT des micro-influenceurs non-payées. Elles voient leurs clientes 1x/mois. Elles postent déjà sur Instagram Stories. Elles ont typiquement 1K-5K followers locaux. Ensemble : force colossale.\\n\\n**APPROPRIATION DÉPÔTS GEMMES :**\\n\\n1. **Lancez un programme micro-influenceur de coiffeuses** :\\n   - Chaque coiffeuse/esthéticienne qui vend tes bijoux = une commission de base (30%)\\n   - BONUS : si elle poste une story Instagram avec la bague (taggée @DépôtsGemmes) = +5€ commission par story\\n   - Tracking : short URL unique ou code promo personalisé (ex : \\\"SALON_NICE_20%\\\") qu'elle share en story\\n   - Fréquence : 1-2 stories/semaine par coiffeuse\\n   - Scope : 450 coiffeuses x 1 post/semaine = 450 posts/semaine de ta marque. Même sans followers géants, c'est de la saturation positive.\\n\\n2. **Créez du UGC kit pour les coiffeuses** :\\n   - Livre blanc simple (5 pages) : \\\"5 Tips pour showcaser les bijoux sur Instagram\\\"\\n      - Tip 1 : Le close-up du bijou en lumière naturelle (meilleure couleur)\\n      - Tip 2 : Le \\\"before/after\\\" (avant bijou / après porté au poignet)\\n      - Tip 3 : Le styling (bijou + look complet de la cliente)\\n      - Tip 4 : Le testimonial (citation de cliente : \\\"Ces bagues je les porte tous les jours \\\")\\n      - Tip 5 : Le trend-jacking (lier le bijou à une tendance TikTok, ex : \\\"coastal grandmother aesthetic\\\")\\n   - Envoie ce kit aux 450 coiffeuses. Les meilleures posts explosent. C'est du earned media.\\n\\n3. **Orchestrez une \\\"bague du mois\\\" TikTok challenge** :\\n   - Chaque mois : mets en avant 1 bijou\\n   - Challenge : \\\"Montre-moi ta meilleure façon de porter [la bague du mois] en 15 secondes\\\"\\n   - Hashtag : #DépôtsGemmesMois\\n   - Récompense : meilleure vidéo reçoit 50€ en bons d'achat, reçoit un feature sur le compte TikTok officiel Dépôts Gemmes\\n   - Participation facile : 15 sec au téléphone, c'est rien. Ça crée de l'engagement viral.\\n\\n4. **Lancez un \\\"TikTok Shop\\\" si possible** :\\n   - En Europe : TikTok Shop n'est pas encore live partout. Mais si tu as une présence TikTok + une petite boutique en ligne (même Shopify simple), tu peux intégrer les bijoux.\\n   - Chaque post TikTok de coiffeuse = lien vers \\\"Acheter\\\" sur ton shop\\n   - Conversion : même 1-2% de tes followers genere traffic ecommerce de folie.\\", "keyTerms": ["Social Commerce", "TikTok Shop", "Live Shopping", "UGC", "Short-form video", "CPM", "ROAS"], "quiz": [{"q": "Le social commerce mondial pèse combien en 2026 ?", "options": ["100 milliards $", "500 milliards $", "1 200 milliards $", "5 000 milliards $"], "correct": 2}, {"q": "L'UGC est combien de fois plus impactant que le contenu de marque ?", "options": ["2x", "5x", "9,8x", "20x"], "correct": 2}, {"q": "TikTok Shop c'est :", "options": ["Un magasin TikTok physique", "L'achat intégré directement dans le feed TikTok", "Un réseau social pour les shops", "Un outil de gestion de stock"], "correct": 1}]}, {"day": 2, "title": "Branding & storytelling de marque", "content": "Dans un monde saturé de marques, celle qui raconte la meilleure histoire gagne. Point.\\n\\n**Le brand equity (capital de marque) :**\\nC'est la valeur intangible totale de ta marque. Ce que les gens pensent, ressentent, associent à ton nom au-delà du produit. Apple ? Pas des ordi, c'est de l'innovation + prestige. Nike ? Pas des chaussures, c'est de la performance + inspiration. Chanel ? Pas du parfum, c'est du luxe + héritage.\\n\\nBrand equity = prix premium que tu peux facturer. Si deux bagues identiques, une \\\"marque X\\\" vs une \\\"Dépôts Gemmes\\\", tu peux vendre la tienne 2€ de plus par unité. Sur 450 salons, 60 bijous/salon, = +54K€/an juste sur le brand premium.\\n\\n**Les 4 composantes critiques du branding retail :**\\n\\n1. **Purpose (raison d'être)** : Pourquoi existes-tu au-delà de faire du profit ? C'est ta \\\"north star\\\". Patagonia = \\\"Save the planet\\\". Typology = \\\"Science-backed, no BS, transparent\\\". Decathlon = \\\"Make sport accessible to everyone\\\". Et toi ? Quel est le purpose de Dépôts Gemmes ?\\n\\n2. **Identité visuelle** : Logo, palette couleur (max 3 couleurs), typo, packaging. La cohérence entre salon, e-mail, app, réseaux sociaux TUE. Sephora ? Noir + or toujours. Starbucks ? Vert signature toujours. Pas de variation, pas de confusion.\\n\\n3. **Tone of voice** : Comment tu parles. Tu es formel ? (\\\"Nos bijoux haut de gamme...\\\") Décalé ? (\\\"Tes bagues sont aussi durables que toi !\\\") Inspirant ? (\\\"Shine differently\\\") Ton tone of voice doit être cohérent partout : email, app, réseaux, présentoir. Et doit matcher ta persona target.\\n\\n4. **Brand experience** : Chaque interaction renforce ou détruit la marque. Le présentoir physique ? L'email de remerciement après achat ? La manière dont tu gères une réclamation ? Tout crée de la perception marque. Si une cliente reçoit une bague cassée et tu remplaces sans questions = tu renforces le brand \\\"attentive\\\". Si tu fais traîner = tu détruis.\\n\\n**Cas De Neuville : RSE coordinator au Spot**\\nDe Neuville (marque chocolat historique française) a un enjeu : se réinventer pour Gen-Z. Stratégie RSE : cacao acheté équitablement, packaging recyclable, CO2 neutral. C'est central à leur brand new campaign \\\"Chocolat responsable\\\". Résultat : prix premium de +15% vs chocolat standard, mais sales +22% chez jeunes clients. Le purpose = revenue amplifier.\\n\\n**Cas Typology (Retail Manager au Spot)**\\nTypology est une DTC brand (direct-to-consumer) de skincare. Leur branding est hyper-clean : formules ultra-simples (8-10 ingrédients max vs 40+ chez concurrents), transparence TOTALE (révèle le coût par ingrédient, leur marge). Design packaging = épuré, blanc, futuriste. Tone of voice = scientifique mais accessible. Brand equity ? Clients paient 20-30% de plus vs concurrents car ils trust la transparency. Typology a ouvert 2 retail stores pour matérialiser le branding (design épuré identique au site).\\n\\n**Cas Gas Bijoux : jewelry brand building**\\nGas Bijoux (créateur français de bijoux, très présent sur TikTok/Instagram) a un branding clear : bijoux colorés, designs géométriques, accessibilité. Leur purpose : \\\"Jewelry that makes you feel good\\\". Tone of voice : léger, optimiste, inclusive. Identité visuelle : couleurs vibantes + design minimaliste. Brand equity résultat : followers TikTok 500K+, conversion rate 8-10% (vs benchmark 1-3%), loyalty repeat-buy 35% (vs benchmark 15-20%).\\n\\n**Le \\\"purpose-driven\\\" retail :**\\n67% des consommateurs Gen-Z et 54% des millénials choisissent une marque pour ses valeurs, pas juste son produit. La RSE (Responsabilité Sociétale Entreprise) n'est plus un \\\"nice to have\\\", c'est un MUST.\\n\\n**Ton branding (Dépôts Gemmes) :**\\n\\nDépôts Gemmes a une histoire PUISSANTE à raconter. Tu dois la structurer et la marteler partout.\\n\\n**APPROPRIATION DÉPÔTS GEMMES :**\\n\\n1. **Définis ton Purpose et Positioning** :\\n   - Purpose : Par exemple : \\\"Jewelry that lasts. A lifetime of beauty, zero waste.\\\" (L'acier inoxydable dure = zéro gaspi)\\n   - Ou : \\\"Accessible beauty, locally delivered.\\\" (Dépôt-vente en salons de proximité = accessible econom + circuit court)\\n   - Ton purpose doit être : authentique (tu y crois), différenciant (competitors ne le disent pas), motivant (parle à la target)\\n\\n2. **Identité visuelle cohérente** :\\n   - Choisis 2-3 couleurs max : ex Gold + Sage Green + Ivory (cohérent, luxe-accessible, nature)\\n   - Logo : crée un simple (si tu n'en as pas)\\n   - Font : une typo sans-serif moderne (Montserrat, Inter, etc.)\\n   - Applique PARTOUT : packaging, email templates, présentoir design, réseaux sociaux. Pas de variation.\\n\\n3. **Tone of voice manifesto** :\\n   - Rédige 5-10 frases qui définissent comment tu parles\\n   - Ex : \\\"Nous sommes honnêtes (pas de bullshit), joyeux (pas tristes), inclusifs (pour tous les budgets), durables (acier = forever)\\\"\\n   - Entraîne tes vendeurs à parler dans ce tone\\n\\n4. **Storytelling articulé** :\\n   - Crée un \\\"brand story\\\" (2-3 paragraphes max) que tu mets partout : site, app, email signature\\n   - Ex : \\\"Dépôts Gemmes started with one idea: jewelry should be beautiful, last forever, and not break the bank. We use stainless steel (not silver) because it's 100x more durable, we deliver locally (450 salons, not a mega-warehouse) because community matters, and we do consignment (zero risk for salons) because we believe in partnership over transactions.\\\"\\n   - Cette story devient ta \\\"north star\\\" pour toutes les décisions\\n\\n5. **RSE / Purpose activation** :\\n   - Lis le bijou à cause (ex : 1€ par bague vendue = donation école locale)\\n   - Ou : \\\"Dépôts Gemmes is plastic-free. All our packaging is recyclable.\\\"\\n   - Ça paraît cliché mais Gen-Z vérifie. Si tu le fais, sois transparent (pas de greenwashing fake).\\n", "keyTerms": ["Brand equity", "Purpose-driven", "Tone of voice", "Storytelling", "Brand experience", "RSE (Responsabilité Sociétale)"], "quiz": [{"q": "Le brand equity c'est :", "options": ["Le chiffre d'affaires de la marque", "La valeur intangible / perception de la marque", "Le nombre de magasins", "Le budget marketing"], "correct": 1}, {"q": "Quel % des Gen-Z choisissent une marque pour ses valeurs ?", "options": ["25%", "45%", "67%", "90%"], "correct": 2}, {"q": "Le 'tone of voice' d'une marque c'est :", "options": ["Le volume sonore en magasin", "La façon dont la marque communique et s'exprime", "La voix du chatbot", "Le style musical de la pub"], "correct": 1}]}]}, {"id": "rh-retail", "icon": "👥", "title": "RH & Organisation Retail 2030", "color": "from-amber-500 to-yellow-600", "tagline": "Business Talk : 'Bâtir l'organisation retail de 2030'", "days": [{"day": 1, "title": "Les enjeux RH du retail en 2026", "content": "Le retail est le 1er employeur privé de France : 3,5M de salariés. Et c'est aussi le secteur qui galère le plus à recruter et retenir.\\n\\n**Le talent crunch retail en 2026 :**\\n- 200 000+ postes non pourvus en France (chiffres officiels)\\n- Turnover moyen : 60-70% dans la restauration, 30-40% dans le retail textile, 20-30% dans le luxe\\n- Coût d'un turnover : 6 à 9 mois de salaire par poste (recruitment, training, onboarding lost productivity)\\n- Burnout epidemic : vendeurs se plaignent de horaires éreintants, salaires bas, peu de reconnaissance\\n\\n**Cas Provalliance : 9 personnes au Spot (includes Directeur Académie Formation)**\\nProvalliance gère 1000+ salons de coiffure + beauté en France et Europe. Leur RH challenge : former et fidéliser 15 000+ salariés (coiffeuses, esthéticiennes, réceptionnistes). Stratégie :\\n- **Académie de Formation Provalliance** : cours en ligne + workshops en présentiel. Formation continue pour upskilling (digital, customer service, business sense). Coût = 3M€/an mais turnover réduit de 35% en 3 ans.\\n- **Marque employeur** : contenus Instagram montrant la vie réelle des salons (stories des coiffeuses, tips métier). Ça attire des jeunes talents qui voient que c'est un métier valorisant.\\n- **Flexibilité** : horaires aménagés, congés flexibles, semaine variable selon saison (moins d'heures en basse saison).\\n\\n**Cas Intersport Académie (2 people au Spot)**\\nIntersport gère 600+ magasins avec 8 000+ employés. Challenge similaire. Stratégie :\\n- **Intersport Académie** : formation spécifique au sport retail. Vendeur = sport enthusiast, pas juste \\\"salesman\\\". Formation porte sur : connaissance produits (équipement running, vélo, etc.), conseils techniques, passion sport.\\n- **Rétention par culture** : les vendeurs Intersport reçoivent des équipes gratuites pour le sport qu'ils pratiquent. Ça crée de l'engagement émotionnel avec la marque.\\n- **Career path transparent** : vendeur > responsable magasin > district manager. Progression claire = moins de turnover.\\n\\n**Les 3 révolutions RH 2026 :**\\n\\n1. **Marque employeur (Employer Branding)** : devenir attractif aux talents. Les retailers investissent massivement : contenu LinkedIn authentique (day-in-the-life des vendeurs), témoignages d'employés, showcasing culture interne. Exemple : Decathlon poste des vidéos TikTok de ses vendeurs donnant des conseils (\\\"5 tips for trail running\\\"). Ça recrute mieux que n'importe quelle annonce \\\"Vendeur cherché\\\".\\n\\n2. **Upskilling / Reskilling** : former les équipes aux nouvelles compétences (digital, data, CRM, IA, omnichannel). Provalliance a une Académie. Intersport a une Académie. Même Gap a lancé une formation online pour ses vendeurs sur le social commerce.\\n\\n3. **Flexibilité radicale** : semaine de 4 jours (certains retailer l'expérimentent), horaires aménagés (tu travailles de 10-19h au lieu de 9-18h si c'est mieux pour toi), télétravail partiel pour le siège (logistique, marketing).\\n\\n**Tech + RH = future**\\n- **Recrutement** : IA fait le matching candidats vs job (Workday, Pymetrics). Moins de réseau/copinage, plus de merit.\\n- **Formation micro** : micro-learning modules (5-10 min videos sur comment utiliser le CRM, comment conseiller client). Mieux qu'une formation 3h indigeste.\\n- **Workforce management** : IA prédit le staffing optimal (météo + événements locaux + historique ventes = combien de vendeurs demain au magasin Nice). Zéro surstock RH, zéro sous-staffing.\\n\\n**Ton business (Dépôts Gemmes) :**\\n\\nTon réseau de 450 salons = des partenaires humains (les coiffeuses, esthéticiennes). La fidélisation de tes salons passe ENTIÈREMENT par la relation humaine et la motivation.\\n\\n**APPROPRIATION DÉPÔTS GEMMES :**\\n\\n1. **Train ton équipe de pickup agents** :\\n   - Pickup agent = la personne qui visite les salons toutes les 6 semaines\\n   - Formation basique (1h, une fois) : comment recharger un présentoir, comment identifier les cassés, comment noter les stats, comment parler aux coiffeuses\\n   - Formation avancée (30 min quarterly) : comment vendre plus (pushing the best sellers), comment négocier une réappro, comment consolider un salon qui décline\\n\\n2. **Motivation system for field agents** :\\n   - KPI + incentive : agent qui visite 8 salons/jour = bonus 100€/mois. Agent qui atteint 50€ CA par salon = +50€ bonus mois.\\n   - Recognition : top performer du mois reçoit shoutout dans le team Slack, featured dans internal newsletter\\n   - Flexibility : agent peut choisir ses routing (quel salon d'abord) vs strict schedule\\n\\n3. **Marque employeur pour agents** :\\n   - Rédige une \\\"agent story\\\" : \\\"Être agent de tournée Dépôts Gemmes = varier tes journées (450 salons différents), bâtir des relations (coiffeuses te connaissent), impact direct (tu sees que les présentoirs que tu prépares génèrent CA).\\\"\\n   - Poste des photos/vidéos : un jour dans la vie d'un agent Dépôts Gemmes\\n   - Bonus : voiture de fonction, flexibilité horaires, commission performance\\n\\n4. **Salon partner motivation** :\\n   - Top performing salon du mois = feature dans newsletter client (\\\"Salon XYZ at Nice sold 150 items this period, new record!\\\") + bonus on commission next round\\n   - Recognition = increases salon loyalty (coiffeuse fière de son salon)\\n", "keyTerms": ["Marque employeur", "Turnover", "Upskilling/Reskilling", "Workforce management", "Employee Experience", "Micro-learning"], "quiz": [{"q": "Combien de postes non pourvus dans le retail FR ?", "options": ["50 000", "100 000", "200 000", "500 000"], "correct": 2}, {"q": "Le coût d'un turnover représente :", "options": ["1 mois de salaire", "3 mois de salaire", "6 à 9 mois de salaire", "2 ans de salaire"], "correct": 2}, {"q": "L'upskilling c'est :", "options": ["Licencier les moins bons", "Former les équipes à de nouvelles compétences", "Augmenter les salaires", "Recruter à l'étranger"], "correct": 1}]}, {"day": 2, "title": "Productivité terrain & Performance RH", "content": "La \\\"Perf' RH Room\\\" du Spot (Business Talk) se concentre sur un sujet critique : comment maximiser la performance des équipes terrain (magasin, tournées, logistics).\\n\\n**Le concept de \\\"store execution\\\" :**\\nC'est la capacité à exécuter PARFAITEMENT les standards en magasin/terrain chaque jour :\\n- Merchandising (présentation produit impeccable)\\n- Propreté (magasin/présentoir nickel)\\n- Accueil chaleureux\\n- Disponibilité produit (pas de ruptures stupides)\\n- Service qualité\\n\\n70% de l'expérience client se joue dans cette exécution. Un magasin Sephora vs un Sephora désorganisé = deux univers différents.\\n\\n**Cas Shiseido Head of Retail Operations & Performance EMEA**\\nShiseido gère 3 000+ points de vente en EMEA (Europe Middle East Africa). Challenge : assurer que chaque point apply les mêmes standards (merchandising, training, service). Stratégie :\\n- **Store audit digital** : photos via phone des présentoirs chaque semaine. IA detect si c'est bien aligné vs standard photo\\n- **KPI tracking real-time** : chaque point rentre ses KPIs dans une app (CA, visitors, transformation rate). Managers voient ça en temps réel.\\n- **Mystery shopper program** : 2x par mois, un mystérieux client va tester le service. Score est tracké et influencer les bonus vendeurs.\\n- **Result** : performance standardization +35%, customer satisfaction NPS +15 points.\\n\\n**Cas Vapostore Directeur Retail**\\nVapostore (vape/nicotine alternatives) a un enjeu : product knowledge CRITICAL car c'est un produit réglementé. Stratégie :\\n- **Mobile training app** : 15-min modules on product knowledge, legal compliance, upsell techniques\\n- **Mobile coaching** : field trainer visite les stores et coache les vendeurs live\\n- **Performance incentive** : meilleur vendeur chaque mois reçoit 200€ bonus + spotlight\\n- **Result** : sales per employee +22%, compliance rate (légal) = 100%\\n\\n**Les KPIs terrain vitaux :**\\n\\n- **Taux de transformation** : % de visiteurs qui achètent. Benchmark : 5-15% retail mode, 30%+ alimentaire. En bijouterie = 8-15% c'est bon. Outil : divisé CA par number of customers = si CA 1000€ et 80 clients ont regardé = 12.5% transform rate.\\n\\n- **Panier moyen (ATV : Average Transaction Value)** : montant moyen par vente. Benchmark : 50-100€ en mode. Si tu augmentes le panier moyen de 10€ = revenue +10% avec même traffic.\\n\\n- **UPT (Units Per Transaction)** : nombre d'articles moyen par panier. Benchmark : 1.5-2.5 en mode. Technique : suggestive selling (\\\"Cette bague irait bien avec une boucle d'oreille\\\").\\n\\n- **Ventes par m²** : productivité d'espace. Calcul : CA total / surface magasin. Optimiser = réaranger layout, eliminer produits morts, featured les bestsellers.\\n\\n- **Ventes par FTE (employee/hour)** : productivité RH. Calcul : CA / nombre d'heures travaillées. Si un agent fait 1000€/20h = 50€/h de CA.\\n\\n**Les outils de productivité terrain :**\\n- **Task management** : Yoobic, Zipline. Assign tasks à vendeurs (restock, clean, merchandising), track completion\\n- **Communication interne** : Steeple, Slack. News, training, policy updates direct to ground\\n- **Formation mobile** : 360Learning, Beedeez. Micro-learning modules, quizzes, certifications\\n\\n**Ton business (Dépôts Gemmes) :**\\n\\nTes KPIs terrain critiques sont :\\n- **Taux de rotation par présentoir** : combien de bijoux vendus / 58 bijoux = % entre 2 tournées (45 jours cycle)\\n- **CA par salon par cycle** : total revenue par salon en 45 jours\\n- **Taux de casse** : % de bijoux endommagés / envoyés\\n- **Pickup productivity** : combien de salons visités par jour, quel CA par visite, combien de km par salon\\n\\n**APPROPRIATION DÉPÔTS GEMMES :**\\n\\n1. **Track tes KPIs terrain religieusement** :\\n   - Crée un Google Sheet ou Airtable (10 min setup):\\n      Colonnes = salon, localisation, type (coiffure/spa/esthétique), CA/45j, rotation %, casse %, dernière visite, next visit\\n      Mises à jour tous les 45 jours (après chaque tournée)\\n   - Analyse : top 10% salons vs bottom 10%. Quel est la différence ? (Localisation? Type? Coiffeuse proactive?)\\n\\n2. **Optimise tes tournées pour productivité** :\\n   - Challenge : 20 salons/jour c'est 3h drive + 2h restock = 5h day. Vs 15 salons/jour = mieux équilibré\\n   - Utilise Google Maps optimization (voir jour 3 module 1) : re-route pour minimiser drive time\\n   - KPI : salons/day, km/day, CA/day. Track hebdos. Target : augmenter salons/day de 15% sans sacrifier quality (casse, client satisfaction)\\n\\n3. **Performance dashboard for field agents** :\\n   - Chaque agent voit son dashboard : \\\"Tu as visité 19 salons cette semaine (target 20). CA = 4500€ (target 5000€ par agent). Top performer this week = agent X (24 salons, 5800€).\\\"\\n   - Transparency + competition légère = motivant\\n   - Bonus : agent qui atteint 22 salons/week = +100€ bonus mois\\n\\n4. **Store (salon) execution standards** :\\n   - Crée une checklist simple (photo) que l'agent doit respecter :\\n      - Bijoux bien alignés (pas de chaos)\\n      - Lighting OK\\n      - Pas de bijoux cassés visible\\n      - Stock card updated\\n      - Coiffeuse \\\"trained\\\" (a reçu update on bestsellers)\\n   - Chaque visite = photo de l'état du présentoir. Si parfait = bonus. Si sloppy = note pour amélioration.\\n", "keyTerms": ["Store execution", "Taux de transformation", "UPT", "Panier moyen", "Ventes/m²", "Task management"], "quiz": [{"q": "Quel % de l'expérience client se joue dans l'exécution terrain ?", "options": ["30%", "50%", "70%", "90%"], "correct": 2}, {"q": "UPT signifie :", "options": ["Universal Price Tag", "Units Per Transaction", "User Profile Tracking", "Unified Payment Terminal"], "correct": 1}, {"q": "Le taux de transformation moyen en retail textile est de :", "options": ["1-3%", "5-15%", "30-40%", "60%+"], "correct": 1}]}]}, {"id": "supply-chain", "icon": "🚚", "title": "Supply Chain & Logistique", "color": "from-cyan-600 to-blue-700", "tagline": "Last mile, logistique durable et optimisation des flux.", "days": [{"day": 1, "title": "Last mile & logistique durable", "content": "Le \\\"last mile\\\" (dernier kilomètre) représente 53% du coût total de livraison. C'est LE défi logistique en 2026.\\n\\n**Les modèles de livraison en 2026 :**\\n\\n- **Click & Collect** : client commande online, récupère en magasin. 40% des commandes e-commerce en France maintenant. Avantage : zéro shipping cost, client vient en magasin (opportunité cross-sell).\\n\\n- **Ship-from-store** : le magasin expédie directement au client (vs. entrepôt central ultralointain). Délai réduit, cost réduit. Carrefour fait cela massively : appro magasin + livraison client = 1 flux logistique optimisé.\\n\\n- **Livraison express** : J+1, J+0, même 2h intra-city (Gorillas, Getir ont créé le modèle, enseignes l'internalisent). Coûteux mais client wow-ed.\\n\\n- **Points relais** : modèle français par excellence (La Poste, Mondial Relay, Amazon Lockers). 80% des Français ont un point relais à < 5min. Client cherche pratique, point relais = bof timing mais accessible.\\n\\n- **Consignes automatiques** : lockers smart. Amazon, Ikea, même petits retailers les deployent. Growth rapide car : zero contact, 24/7 access.\\n\\n**La logistique durable (regulatory + competitive necessity) :**\\n\\n- **Véhicules électriques** : pour le last mile city delivery. Paris, Lyon mandate carbon neutral deliveries by 2030. Cost premium 20-30% vs diesel mais subsidies help.\\n\\n- **Optimisation routes** : IA optimise tournées = moins de km = moins de CO2 + moins de coût. Every 10% km reduction = 5% cost saving + carbon reduction.\\n\\n- **Emballages réutilisables** : loop, consigne (ex : bouteille Coca return system). Retailer avantage : brand positive + cost reduction (reusable < 1-time).\\n\\n- **Économie circulaire B2B** : Decathlon rental model (loue vélos, tentes, etc.). Logistique implication = reverse logistics infrastructure (collecte, quality check, reparation, resell/recycle).\\n\\n**Cas Decathlon Circular Business Model (au Spot) :**\\nDecathlon offre location au lieu de juste vendre. Supply chain impact :\\n- Décentralisation : 200+ micro-hubs vs 10 géants. Closer to customer = faster pickup/return\\n- Reverse logistics : items return => quality check => repair (80%) vs recycle (20%). Cost model = rental fee higher than resale margin, but recurring revenue\\n- Tech : RFID track items, predict wear/damage, schedule preventive maintenance\\n- Result : sustainability + recurring revenue +12%/year\\n\\n**Pour toi (Dépôts Gemmes - c'est ta logistique !) :**\\n\\nTa logistique c'est tes tournées de réapprovisionnement des 450 salons. C'est ton \\\"last mile\\\" à toi.\\n\\n**APPROPRIATION DÉPÔTS GEMMES :**\\n\\n1. **Optimize ton \\\"last mile\\\" = tes tournées** :\\n   - Challenge : tu vas de salon à salon tous les 45j. Enjeu = minimiser km, maxmizer salons/journée, reduce costs.\\n   - Solution : Google Maps API optimization (voir module 1 jour 3). Génère la meilleure route pour visiter 20 salons en minimisant km.\\n   - Économie : typiquement -15-20% km vs routing manuel = 500-1000€/mois en essence sur 1-2 tournées\\n   - Setup cost : 50-200€/mois outils. ROI = 3-6 mois.\\n\\n2. **Segment salons par frequency de pickup** :\\n   - VIP (top 10%) : 2 pickups/45j (au lieu de 1). Raison = rotation rapide, stock frais = plus de ventes\\n   - Core (middle 80%) : 1 pickup/45j standard\\n   - At-risk (bottom 10%) : 1 pickup/60j. Rotation lente = pas besoin restock rapide, saves costs\\n   - Résultat : Optimized logistics + better performance pour top performers\\n\\n3. **Packaging & durability (reduce casse = reduce waste)** :\\n   - Casse coûte cher : tu dois remplacer, + c'est mauvais pour retail image\\n   - Investis en better packaging (10€ extra par shipment) = reduce casse 50% = net gain (replacement cost save > packaging cost)\\n   - Durable packaging = sustainability angle pour marketing\\n\\n4. **Route density & geographic clustering** :\\n   - Map tous tes 450 salons. Peut-être 80/20 rule : 80% de salons en 60% des zones?\\n   - Cluster par région (Paris basin, Lyon, Marseille, Nord) = separate tournées per cluster\\n   - Benefit : agent specialization (agent parisien connaît ses 80 salons très bien), efficiency\\n\\n5. **Reve
